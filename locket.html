<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Love - Khoảnh Khắc Tức Thì ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .locket-body {
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .locket-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Main Widget Style */
        .locket-widget-main {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 60px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            border: 4px solid #1a1a1a;
        }

        .locket-img-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .locket-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .sender-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sender-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ff4d4d;
        }

        .locket-caption {
            font-weight: 600;
            font-size: 1.1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Controls */
        .locket-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 1rem;
        }

        .locket-btn {
            width: 70px;
            height: 70px;
            background: #ffcc00; /* Gold like Locket Gold */
            color: #000;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 204, 0, 0.3);
        }

        .locket-btn:hover { transform: scale(1.1); }
        .locket-btn.secondary { background: #1a1a1a; color: white; width: 55px; height: 55px; box-shadow: none; font-size: 1.3rem; }

        /* History Grid */
        .history-section {
            margin-top: 2rem;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .history-item {
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .history-item:hover { transform: scale(0.95); opacity: 0.8; }
        .history-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Upload Modal */
        .upload-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upload-card {
            background: #111;
            padding: 2rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .upload-preview {
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #222;
        }

        .upload-input-file { display: none; }
    </style>
</head>
<body class="locket-body">
    <div class="back-nav" style="position: absolute; left: 20px; top: 20px;">
        <a href="love.html" class="back-link" style="background: #1a1a1a; color: white;"><i class="fa-solid fa-arrow-left"></i> Hub</a>
    </div>

    <div class="locket-container">
        <!-- Main Display Widget -->
        <div class="locket-widget-main" id="main-widget">
            <img id="main-locket-img" src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=800&q=80" class="locket-img-main">
            <div class="locket-overlay">
                <div class="sender-info">
                    <img id="sender-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=100&q=80" class="sender-avatar">
                    <div>
                        <span style="display: block; font-size: 0.8rem; opacity: 0.7;">Vừa xong</span>
                        <span id="sender-name" class="locket-caption">Yêu em ❤️</span>
                    </div>
                </div>
                <div style="font-size: 1.5rem; cursor: pointer;"><i class="fa-solid fa-heart" style="color: #ff4d4d;"></i></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="locket-controls">
            <button class="locket-btn secondary" onclick="location.reload()"><i class="fa-solid fa-rotate"></i></button>
            <button class="locket-btn" onclick="openUpload()"><i class="fa-solid fa-camera"></i></button>
            <button class="locket-btn secondary" onclick="alert('Tính năng Locket Gold đang cập nhật!')"><i class="fa-solid fa-crown" style="color: #ffcc00;"></i></button>
        </div>

        <!-- History / Moments -->
        <div class="history-section">
            <h3 style="margin-bottom: 1.5rem; font-family: 'Outfit', sans-serif; display: flex; justify-content: space-between;">
                <span>Lịch sử khoảnh khắc</span>
                <span id="moment-count" style="opacity: 0.5; font-size: 0.9rem;">0 khoảnh khắc</span>
            </h3>
            <div class="history-grid" id="history-grid">
                <!-- History items will be injected here -->
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="upload-modal">
        <div class="upload-card">
            <h3 style="margin-bottom: 1.5rem; text-align: center;">Gửi khoảnh khắc mới</h3>
            <div class="upload-preview" id="upload-preview">
                <i class="fa-solid fa-image" style="font-size: 3rem; opacity: 0.2;"></i>
                <img id="preview-img" style="display: none; width: 100%; height: 100%; object-fit: cover;">
            </div>
            <input type="file" id="locket-file" class="upload-input-file" accept="image/*" onchange="previewFile()">
            <button class="action-btn" style="width: 100%; justify-content: center; background: #333; margin-bottom: 10px;" onclick="document.getElementById('locket-file').click()">Chọn ảnh từ máy</button>
            <input type="text" id="locket-caption" class="m-input" placeholder="Thêm chú thích..." style="width: 100%; margin-bottom: 1rem; background: #000;">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1; justify-content: center; background: #ffcc00; color: #000;" onclick="sendLocket()">Gửi đi</button>
                <button class="action-btn" style="flex: 1; justify-content: center; background: none; border: 1px solid #333;" onclick="closeUpload()">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/locket";
        let moments = [];

        async function fetchMoments() {
            try {
                const response = await fetch(API_URL);
                moments = await response.json();
                renderLocket();
            } catch (error) {
                console.error("Lỗi tải Locket:", error);
            }
        }

        function renderLocket() {
            const grid = document.getElementById('history-grid');
            const countLabel = document.getElementById('moment-count');
            
            if (moments.length > 0) {
                // Update Main Widget with latest
                const latest = moments[moments.length - 1];
                document.getElementById('main-locket-img').src = 'http://localhost:8080' + latest.imageUrl;
                document.getElementById('sender-name').innerText = latest.caption || "Khoảnh khắc ❤️";
                
                // Update Grid
                grid.innerHTML = moments.slice().reverse().map(m => `
                    <div class="history-item" onclick="viewMoment('${m.imageUrl}', '${m.caption}')">
                        <img src="${'http://localhost:8080' + m.imageUrl}">
                    </div>
                `).join('');
                countLabel.innerText = `${moments.length} khoảnh khắc`;
            } else {
                grid.innerHTML = '<div style="grid-column: span 3; text-align: center; opacity: 0.3; padding: 2rem;">Chưa có khoảnh khắc nào. Hãy gửi cái đầu tiên!</div>';
            }
        }

        function openUpload() { document.getElementById('upload-modal').style.display = 'flex'; }
        function closeUpload() { 
            document.getElementById('upload-modal').style.display = 'none';
            document.getElementById('preview-img').style.display = 'none';
            document.querySelector('#upload-preview i').style.display = 'block';
        }

        function previewFile() {
            const file = document.getElementById('locket-file').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.querySelector('#upload-preview i').style.display = 'none';
            };
            if (file) reader.readAsDataURL(file);
        }

        async function sendLocket() {
            const fileInput = document.getElementById('locket-file');
            const captionInput = document.getElementById('locket-caption');
            
            if (!fileInput.files[0]) return alert("Vui lòng chọn ảnh!");

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("caption", captionInput.value);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    fetchMoments();
                    closeUpload();
                    captionInput.value = '';
                    fileInput.value = '';
                }
            } catch (error) {
                alert("Lỗi gửi ảnh Locket!");
            }
        }

        function viewMoment(url, cap) {
            document.getElementById('main-locket-img').src = 'http://localhost:8080' + url;
            document.getElementById('sender-name').innerText = cap || "Khoảnh khắc ❤️";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Poll for new moments every 5 seconds
        setInterval(fetchMoments, 5000);

        window.onload = fetchMoments;
    </script>
</body>
</html>
