<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - Mtruong_dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Screen */
        #login-screen {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-card h2 { margin-bottom: 20px; color: white; }
        
        .pass-input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        /* Dashboard Screen */
        #dashboard-screen {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin-top: 80px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .class-table-container {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: rgba(15, 23, 42, 0.4);
            color: #3b82f6;
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }

        .btn-add {
            background: #f15a24;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btns i {
            cursor: pointer;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .action-btns i:hover { color: #f15a24; }
    </style>
</head>
<body>
    <header class="header-logo-area">
        <div class="header-content">
            <div class="logo">
                <a href="index.html" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-circle-user logo-icon"></i> <span>Mtruong</span>_dev</a>
            </div>
            <div class="header-right">
                Quản lý Hệ thống Lớp học
            </div>
        </div>
    </header>

    <main class="admin-container">
        <!-- Login -->
        <div id="login-screen">
            <div class="login-card">
                <i class="fa-solid fa-lock" style="font-size: 3rem; color: #f15a24; margin-bottom: 20px;"></i>
                <h2>Yêu cầu Mật khẩu</h2>
                <input type="password" id="password" class="pass-input" placeholder="****">
                <button onclick="checkPass()" class="btn-orange w-full">Truy cập</button>
                <p id="error-msg" style="color: #ef4444; margin-top: 15px; display: none;">Mật khẩu không đúng!</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-screen">
            <div class="dashboard-header">
                <h2><i class="fa-solid fa-chalkboard-user"></i> Danh Sách Lớp Đang Dạy</h2>
                <button class="btn-add" onclick="addClass()"><i class="fa-solid fa-plus"></i> Thêm Lớp Mới</button>
            </div>

            <div class="class-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Học Sinh</th>
                            <th>Môn Học</th>
                            <th>Lịch Học</th>
                            <th>Học Phí / Buổi</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="class-list">
                        <!-- Dữ liệu sẽ load từ JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const CORRECT_PASS = "1002";

        function checkPass() {
            const pass = document.getElementById('password').value;
            if (pass === CORRECT_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                loadClasses();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Dữ liệu mẫu (sẽ lưu vào localStorage)
        let classes = JSON.parse(localStorage.getItem('myClasses')) || [
            { id: 1, name: "Nguyễn Văn An", subject: "Toán 12", schedule: "T2, T4 (19h-21h)", price: "250.000đ", status: "active" },
            { id: 2, name: "Lê Thị Hoa", subject: "Hóa 11", schedule: "T7, CN (15h-17h)", price: "200.000đ", status: "active" }
        ];

        function loadClasses() {
            const list = document.getElementById('class-list');
            list.innerHTML = "";
            classes.forEach(c => {
                list.innerHTML += `
                    <tr>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.subject}</td>
                        <td>${c.schedule}</td>
                        <td>${c.price}</td>
                        <td><span class="status-badge status-${c.status}">${c.status === 'active' ? 'Đang dạy' : 'Tạm dừng'}</span></td>
                        <td class="action-btns">
                            <i class="fa-solid fa-pen-to-square" title="Sửa"></i>
                            <i class="fa-solid fa-trash" title="Xóa" onclick="deleteClass(${c.id})"></i>
                        </td>
                    </tr>
                `;
            });
        }

        function deleteClass(id) {
            if (confirm('Bạn có chắc muốn xóa lớp này?')) {
                classes = classes.filter(c => c.id !== id);
                localStorage.setItem('myClasses', JSON.stringify(classes));
                loadClasses();
            }
        }

        function addClass() {
            const name = prompt("Nhập tên học sinh:");
            if (name) {
                const subject = prompt("Nhập môn học:");
                const schedule = prompt("Nhập lịch học:");
                const price = prompt("Nhập học phí:");
                const newClass = {
                    id: Date.now(),
                    name, subject, schedule, price, status: 'active'
                };
                classes.push(newClass);
                localStorage.setItem('myClasses', JSON.stringify(classes));
                loadClasses();
            }
        }
    </script>
</body>
</html>
