<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Thư Tình Yêu ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .msg-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .msg-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .msg-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            color: #ff4d4d;
            margin-bottom: 1rem;
        }

        /* Random Message Card */
        .random-msg-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 40px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 5rem;
            position: relative;
            overflow: hidden;
        }
        .random-msg-card::before {
            content: '\f10d';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 4rem;
            opacity: 0.1;
            color: #ff4d4d;
        }
        #random-quote {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.6;
            font-style: italic;
            color: #fff;
        }

        /* Secret Box Grid */
        .secret-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .envelope-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .envelope-card:hover {
            transform: translateY(-10px);
            border-color: #ff4d4d;
            background: rgba(255, 77, 77, 0.05);
        }
        .envelope-card.locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }
        .envelope-icon {
            font-size: 3.5rem;
            color: #ff4d4d;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }
        .envelope-card:hover .envelope-icon { transform: scale(1.1); }
        .unlock-date {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ff4d4d;
            margin-bottom: 5px;
            display: block;
        }
        .env-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; }
        .env-status { font-size: 0.8rem; opacity: 0.6; }

        /* Floating Add Msg Btn */
        .add-msg-btn {
            position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px;
            background: #ff4d4d; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; box-shadow: 0 10px 25px rgba(255, 77, 77, 0.5);
            cursor: pointer; z-index: 2000; border: none; transition: 0.3s;
        }
        .add-msg-btn:hover { transform: scale(1.1) rotate(90deg); }

        /* Message Modal */
        .msg-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 4000;
        }
        .msg-modal-card {
            background: #1e293b; padding: 3rem; border-radius: 40px; width: 500px;
            border: 1px solid rgba(255, 77, 77, 0.3); text-align: center;
        }
        .msg-modal-card h3 { color: #ff4d4d; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .msg-content-full { font-size: 1.2rem; line-height: 1.8; color: #f1f5f9; font-style: italic; }

        /* Add Modal */
        .add-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .add-modal-card {
            background: #0f172a; padding: 2.5rem; border-radius: 35px; width: 500px;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        /* Modern Form Styling */
        .modal-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 14px 18px; border-radius: 15px; margin-bottom: 5px;
            font-family: 'Outfit', sans-serif; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .modal-input:focus {
            outline: none; border-color: #ff4d4d; background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(255,77,77,0.15);
        }
        .modal-input::-webkit-calendar-picker-indicator {
            filter: invert(1); cursor: pointer;
        }
        
        .action-btn {
            background: #ff4d4d; color: white; border: 1px solid #ff4d4d; padding: 14px 25px;
            border-radius: 100px; cursor: pointer; font-weight: 600; display: flex;
            align-items: center; gap: 10px; transition: 0.3s; font-family: 'Outfit', sans-serif;
            font-size: 1rem;
        }
        .action-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(255, 77, 77, 0.4); 
        }
        .action-btn.outline {
            background: transparent; border-color: rgba(255,255,255,0.2); color: white;
        }
        .action-btn.outline:hover {
            border-color: white; background: rgba(255,255,255,0.1); box-shadow: none;
        }
    </style>
</head>
<body class="love-page-body">
    <!-- Global Widgets -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
    </div>

    <div class="music-player">
        <i class="fa-solid fa-play music-btn" id="play-pause" onclick="toggleMusic()"></i>
        <span id="song-title">Perfect - Ed Sheeran ❤️</span>
        <audio id="bg-music" loop>
            <source src="https://github.com/hoangtran0410/Pretty-In-Love/blob/master/music/perfect.mp3?raw=true" type="audio/mpeg">
        </audio>
    </div>

    <div class="back-nav">
        <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
    </div>

    <main class="msg-container">
        <div class="msg-header">
            <h2>Hộp Thư Tình Yêu</h2>
            <p>Gửi những lời nhắn bí mật cho tương lai ✨</p>
        </div>

        <!-- Random Quote Section -->
        <div class="random-msg-card">
            <p id="random-quote">Đang tải lời nhắn ngọt ngào...</p>
            <button class="action-btn" style="margin-top: 2rem; margin-left: auto; margin-right: auto;" onclick="showRandomQuote()">
                <i class="fa-solid fa-shuffle"></i> Xem lời nhắn khác
            </button>
        </div>

        <!-- Secret Messages Section -->
        <h3 style="font-size: 2rem; color: #ff4d4d; text-align: center; margin-bottom: 2.5rem;">Thư Hẹn Giờ 💌</h3>
        <div id="secret-grid" class="secret-grid">
            <!-- Messages will be rendered here -->
        </div>
    </main>

    <button class="add-msg-btn" onclick="openAddModal()"><i class="fa-solid fa-paper-plane"></i></button>

    <!-- Detailed Message Modal -->
    <div id="msg-detail-modal" class="msg-modal-overlay" onclick="closeMsgModal()">
        <div class="msg-modal-card" onclick="event.stopPropagation()">
            <div class="envelope-icon" style="font-size: 5rem;"><i class="fa-solid fa-envelope-open-text"></i></div>
            <h3 id="modal-msg-title">Tiêu đề thư</h3>
            <p id="modal-msg-content" class="msg-content-full"></p>
            <button class="action-btn" style="margin-top: 2.5rem; width: 100%; justify-content: center;" onclick="closeMsgModal()">Đóng hộp thư</button>
        </div>
    </div>

    <!-- Add Message Modal -->
    <div id="add-msg-modal" class="add-modal-overlay">
        <div class="add-modal-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-paper-plane" style="font-size: 2.5rem; color: #ff4d4d; margin-bottom: 1rem;"></i>
                <h3 style="color: #ff4d4d; font-size: 1.8rem; margin: 0;">Gửi thư cho tương lai</h3>
                <p style="opacity: 0.7; font-size: 0.9rem; margin-top: 5px;">Viết những tâm tư cho một ngày đặc biệt</p>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; opacity: 0.7; margin-bottom: 8px;"><i class="fa-solid fa-heading"></i> Tiêu đề lá thư</label>
                <input type="text" id="new-msg-title" class="modal-input" placeholder="VD: Gửi em ngày Valentine...">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; opacity: 0.7; margin-bottom: 8px;"><i class="fa-solid fa-calendar-day"></i> Ngày mở thư</label>
                <input type="date" id="new-msg-date" class="modal-input">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-size: 0.85rem; opacity: 0.7; margin-bottom: 8px;"><i class="fa-solid fa-pen-nib"></i> Nội dung bức thư</label>
                <textarea id="new-msg-content" class="modal-input" style="height: 140px; resize: none;" placeholder="Viết những gì bạn muốn nói với nửa kia vào lúc đó..."></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <button class="action-btn" style="flex: 1; justify-content: center;" onclick="saveNewMessage()"><i class="fa-solid fa-paper-plane"></i> Gửi thư</button>
                <button class="action-btn outline" style="flex: 1; justify-content: center;" onclick="closeAddModal()"><i class="fa-solid fa-xmark"></i> Hủy bỏ</button>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            "Anh yêu em nhiều hơn cả những gì anh có thể nói ❤️",
            "Cảm ơn em đã bước vào cuộc đời anh và làm nó trở nên rực rỡ hơn ✨",
            "Dù cả thế giới có quay lưng lại, anh vẫn sẽ luôn ở đây bên em.",
            "Em là điều tuyệt vời nhất mà định mệnh đã dành tặng cho anh.",
            "Tình yêu không phải là tìm thấy một người hoàn hảo, mà là học cách nhìn thấy những điều hoàn hảo từ một người không hoàn hảo."
        ];

        let secretMessages = JSON.parse(localStorage.getItem('loveTimedMessages')) || [
            { id: 1, title: "Ngày Valentine", date: "2026-02-14", content: "Chúc mừng lễ tình nhân đầu tiên của chúng mình! Mong chúng mình mãi hạnh phúc như thế này nhé ❤️", unlocked: false },
            { id: 2, title: "Sinh nhật Em", date: "2026-05-20", content: "Chúc mừng sinh nhật công chúa của anh! Chúc em luôn xinh đẹp, rạng rỡ và yêu anh nhiều hơn mỗi ngày ✨", unlocked: false }
        ];

        function showRandomQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('random-quote').innerText = quote;
        }

        function renderMessages() {
            const grid = document.getElementById('secret-grid');
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            grid.innerHTML = secretMessages.map((m, idx) => {
                const unlockDate = new Date(m.date);
                const isLocked = now < unlockDate;
                
                return `
                    <div class="envelope-card ${isLocked ? 'locked' : ''}" onclick="openMessage(${m.id})">
                        <div class="envelope-icon">
                            <i class="fa-solid ${isLocked ? 'fa-envelope-circle-check' : 'fa-envelope-open-text'}"></i>
                        </div>
                        <span class="unlock-date">${m.date.split('-').reverse().join('/')}</span>
                        <h3 class="env-title">${m.title}</h3>
                        <p class="env-status">${isLocked ? '<i class="fa-solid fa-lock"></i> Đang chờ đến ngày...' : '<i class="fa-solid fa-lock-open"></i> Nhấn để mở thư'}</p>
                        ${!isLocked ? `<i class="fa-solid fa-trash-can" style="position: absolute; top: 15px; right: 15px; opacity: 0.3;" onclick="deleteMsg(event, ${m.id})"></i>` : ''}
                    </div>
                `;
            }).join('');

            localStorage.setItem('loveTimedMessages', JSON.stringify(secretMessages));
        }

        function openMessage(id) {
            const m = secretMessages.find(item => item.id === id);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const unlockDate = new Date(m.date);

            if (now < unlockDate) {
                alert(`Suỵt! Thư này bí mật, phải đến ngày ${m.date.split('-').reverse().join('/')} mới mở được cơ ❤️`);
                return;
            }

            document.getElementById('modal-msg-title').innerText = m.title;
            document.getElementById('modal-msg-content').innerText = m.content;
            document.getElementById('msg-detail-modal').style.display = 'flex';
        }

        function saveNewMessage() {
            const title = document.getElementById('new-msg-title').value;
            const date = document.getElementById('new-msg-date').value;
            const content = document.getElementById('new-msg-content').value;

            if (!title || !date || !content) return alert('Vui lòng điền đầy đủ thông tin thư!');

            secretMessages.push({ id: Date.now(), title, date, content });
            renderMessages();
            closeAddModal();
            // Clear
            document.getElementById('new-msg-title').value = '';
            document.getElementById('new-msg-date').value = '';
            document.getElementById('new-msg-content').value = '';
        }

        function deleteMsg(e, id) {
            e.stopPropagation();
            if (confirm('Xóa lá thư này?')) {
                secretMessages = secretMessages.filter(m => m.id !== id);
                renderMessages();
            }
        }

        function closeMsgModal() { document.getElementById('msg-detail-modal').style.display = 'none'; }
        function openAddModal() { document.getElementById('add-msg-modal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('add-msg-modal').style.display = 'none'; }

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('dark-mode-icon');
            icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        const audio = document.getElementById('bg-music');
        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn'; }
            else { audio.pause(); document.getElementById('play-pause').className = 'fa-solid fa-play music-btn'; }
        }

        window.onload = () => {
            showRandomQuote();
            renderMessages();
        };
    </script>
</body>
</html>
