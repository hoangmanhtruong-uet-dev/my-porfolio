<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Dự Án - Mtruong_dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #login-screen { max-width: 400px; width: 100%; text-align: center; }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pass-input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        #dashboard-screen {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin-top: 80px;
        }

        .dashboard-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-tab {
            padding: 10px 20px;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            background: rgba(30, 41, 59, 0.5);
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: #f15a24;
            color: white;
        }

        .project-table-container {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(15, 23, 42, 0.4); color: #3b82f6; }

        .tech-tags span {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .action-btns i { cursor: pointer; margin-right: 15px; transition: color 0.3s; }
        .action-btns i:hover { color: #f15a24; }
    </style>
</head>
<body>
    <header class="header-logo-area">
        <div class="header-content">
            <div class="logo">
                <a href="index.html" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-circle-user logo-icon"></i> <span>Mtruong</span>_dev</a>
            </div>
            <div class="header-right">Quản lý Dự án</div>
        </div>
    </header>

    <main class="admin-container">
        <!-- Login -->
        <div id="login-screen">
            <div class="login-card">
                <i class="fa-solid fa-code" style="font-size: 3rem; color: #3b82f6; margin-bottom: 20px;"></i>
                <h2>Admin Project</h2>
                <input type="password" id="password" class="pass-input" placeholder="****">
                <button onclick="checkPass()" class="btn btn-primary w-full" style="border:none;">Truy cập</button>
                <p id="error-msg" style="color: #ef4444; margin-top: 15px; display: none;">Mật khẩu không đúng!</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-screen">
            <div class="dashboard-nav">
                <a href="manage.html" class="nav-tab">Quản lý Lớp học</a>
                <a href="manage_projects.html" class="nav-tab active">Quản lý Dự án</a>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2><i class="fa-solid fa-diagram-project"></i> Danh Sách Dự Án Cá Nhân</h2>
                <button class="btn-add" onclick="addProject()"><i class="fa-solid fa-plus"></i> Thêm Dự Án</button>
            </div>

            <div class="project-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tên Dự Án</th>
                            <th>Công Nghệ</th>
                            <th>Mô Tả Ngắn</th>
                            <th>Link</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="project-list">
                        <!-- Load from JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const CORRECT_PASS = "1002";

        function checkPass() {
            const pass = document.getElementById('password').value;
            if (pass === CORRECT_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                loadProjects();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Dữ liệu mẫu (mặc định)
        let projects = JSON.parse(localStorage.getItem('myProjects')) || [
            { id: 1, name: "Hệ Thống Đấu Giá", tech: "Java, MySQL", desc: "Ứng dụng quản lý đấu giá...", link: "auction.html" },
            { id: 2, name: "Personal Portfolio", tech: "HTML, CSS, JS", desc: "Website cá nhân hiện đại...", link: "index.html" }
        ];

        function loadProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            projects.forEach(p => {
                const tags = p.tech.split(',').map(t => `<span>${t.trim()}</span>`).join('');
                list.innerHTML += `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td class="tech-tags">${tags}</td>
                        <td>${p.desc}</td>
                        <td><a href="${p.link}" target="_blank" style="color:#3b82f6;">Xem</a></td>
                        <td class="action-btns">
                            <i class="fa-solid fa-pen-to-square"></i>
                            <i class="fa-solid fa-trash" onclick="deleteProject(${p.id})"></i>
                        </td>
                    </tr>
                `;
            });
        }

        function deleteProject(id) {
            if (confirm('Xóa dự án này?')) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('myProjects', JSON.stringify(projects));
                loadProjects();
            }
        }

        function addProject() {
            const name = prompt("Tên dự án:");
            if (name) {
                const tech = prompt("Công nghệ (cách nhau bởi dấu phẩy):");
                const desc = prompt("Mô tả ngắn:");
                const link = prompt("Link (tên file .html hoặc URL):");
                const newProj = { id: Date.now(), name, tech, desc, link };
                projects.push(newProj);
                localStorage.setItem('myProjects', JSON.stringify(projects));
                loadProjects();
            }
        }
    </script>
</body>
</html>
