<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album & Video Kỷ Niệm ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .media-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .media-header {
            text-align: center;
            margin-bottom: 5rem;
        }
        .media-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            color: #ff4d4d;
        }
        
        /* Slideshow */
        .slideshow-section { margin-bottom: 6rem; position: relative; }
        .slideshow-container {
            height: 500px; border-radius: 40px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .slide {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            transition: opacity 1s ease-in-out; background-size: cover; background-position: center;
        }
        .slide.active { opacity: 1; }
        .slideshow-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; text-align: center;
        }

        /* Video Section */
        .video-section { margin-bottom: 6rem; text-align: center; }
        .video-wrapper {
            max-width: 800px; margin: 0 auto; aspect-ratio: 16/9; background: #000;
            border-radius: 30px; overflow: hidden; border: 2px solid rgba(255, 77, 77, 0.2);
        }

        /* Funny Grid */
        .funny-section { position: relative; margin-top: 4rem; }
        .funny-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .funny-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;
        }
        .funny-card {
            border-radius: 25px; overflow: hidden; position: relative; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
        }
        .funny-card:hover { transform: rotate(3deg) scale(1.05); border-color: #ff4d4d; }
        .funny-card img { width: 100%; height: 280px; object-fit: cover; }
        .funny-tag {
            position: absolute; top: 15px; right: 15px; background: #ff4d4d;
            color: white; padding: 5px 15px; border-radius: 100px; font-size: 0.8rem; font-weight: 700;
        }
        .delete-media {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5);
            color: white; width: 30px; height: 30px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
        }
        .funny-card:hover .delete-media { opacity: 1; }

        /* Floating Add Btn */
        .add-media-btn {
            position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px;
            background: #ff4d4d; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; box-shadow: 0 10px 25px rgba(255, 77, 77, 0.5);
            cursor: pointer; z-index: 2000; border: none; transition: 0.3s;
        }
        .add-media-btn:hover { transform: scale(1.1) rotate(90deg); }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-card {
            background: rgba(30, 41, 59, 0.95); padding: 2.5rem; border-radius: 35px;
            width: 450px; border: 1px solid rgba(255, 77, 77, 0.3);
        }
        .modal-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 15px; border-radius: 15px; margin-bottom: 1.2rem;
        }

        @media (max-width: 600px) { .slideshow-container { height: 350px; } }
    </style>
</head>
<body class="love-page-body">
    <!-- Global Widgets -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
    </div>

    <div class="music-player"></div>

    <div class="back-nav">
        <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
    </div>

    <main class="media-container">
        <div class="media-header">
            <h2>Album & Video</h2>
            <p>Nơi lưu giữ những thước phim và hình ảnh "dìm hàng" nhất ✨</p>
        </div>

        <!-- Slideshow Section -->
        <div class="slideshow-section">
            <div class="slideshow-container" id="slideshow-container">
                <!-- Slides will be rendered here -->
            </div>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <h3 style="font-size: 2rem; margin-bottom: 2rem; color: #ff4d4d;">Vlog CapCut Kỷ Niệm</h3>
            <div class="video-wrapper">
                <div style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; background: #0f172a;">
                    <i class="fa-solid fa-clapperboard" style="font-size: 3rem; color: #ff4d4d; margin-bottom: 10px;"></i>
                    <p>Dán mã nhúng Video vào đây!</p>
                </div>
            </div>
        </div>

        <!-- Funny Moments -->
        <div class="funny-section">
            <div class="funny-header">
                <h3 style="font-size: 2.2rem; color: #ff4d4d; font-family: 'Pacifico', cursive;">Góc "Dìm Hàng" 😂</h3>
            </div>
            <div id="funny-grid" class="funny-grid">
                <!-- Funny cards will be rendered here -->
            </div>
        </div>
    </main>

    <button class="add-media-btn" onclick="openAddModal()"><i class="fa-solid fa-plus"></i></button>

    <!-- Add Media Modal -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color: #ff4d4d; margin-bottom: 1.5rem;">Thêm ảnh kỉ niệm</h3>
            <input type="text" id="m-input-url" class="modal-input" placeholder="Link ảnh (URL)...">
            <input type="text" id="m-input-tag" class="modal-input" placeholder="Caption/Tag (VD: Ngáo, Ham ăn...)">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1; justify-content: center;" onclick="saveMedia()">Thêm</button>
                <button class="action-btn" style="flex: 1; justify-content: center; background: none;" onclick="closeAddModal()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/music.js"></script>
    <script>
        let mediaData = JSON.parse(localStorage.getItem('loveMediaList')) || [
            { url: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=800&q=80", tag: "Kỷ niệm", isSlideshow: true },
            { url: "https://images.unsplash.com/photo-1531384441138-2736e62e0919?auto=format&fit=crop&w=400&q=80", tag: "Ngáo 🤪", isSlideshow: false },
            { url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400&q=80", tag: "Đang dỗi 😤", isSlideshow: false }
        ];

        function renderMedia() {
            const slideshow = document.getElementById('slideshow-container');
            const grid = document.getElementById('funny-grid');
            
            // Render Slideshow (Top 3 or specific)
            const slides = mediaData.slice(0, 5); // Take first 5 for slideshow
            slideshow.innerHTML = slides.map((m, idx) => `
                <div class="slide ${idx === 0 ? 'active' : ''}" style="background-image: url('${m.url}')">
                    <div class="slideshow-overlay"><h3>${m.tag}</h3></div>
                </div>
            `).join('');

            // Render Funny Grid
            grid.innerHTML = mediaData.map((m, idx) => `
                <div class="funny-card">
                    <img src="${m.url}" alt="Funny Moment">
                    <div class="funny-tag">${m.tag}</div>
                    <div class="delete-media" onclick="deleteMedia(${idx})"><i class="fa-solid fa-trash-can"></i></div>
                </div>
            `).join('');

            localStorage.setItem('loveMediaList', JSON.stringify(mediaData));
            startSlideshow();
        }

        function saveMedia() {
            const url = document.getElementById('m-input-url').value;
            const tag = document.getElementById('m-input-tag').value;
            if (!url) return alert('Vui lòng dán link ảnh!');

            mediaData.push({ url, tag: tag || "Kỉ niệm", isSlideshow: false });
            renderMedia();
            closeAddModal();
            document.getElementById('m-input-url').value = '';
            document.getElementById('m-input-tag').value = '';
        }

        function deleteMedia(idx) {
            if (confirm('Xóa ảnh này khỏi album?')) {
                mediaData.splice(idx, 1);
                renderTimeline(); // Wait, meant renderMedia
                renderMedia();
            }
        }

        let slideInterval;
        function startSlideshow() {
            clearInterval(slideInterval);
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            if (slides.length <= 1) return;
            slideInterval = setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 5000);
        }

        function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('dark-mode-icon');
            icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        const audio = document.getElementById('bg-music');
        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn'; }
            else { audio.pause(); document.getElementById('play-pause').className = 'fa-solid fa-play music-btn'; }
        }

        window.onload = renderMedia;
    </script>
</body>
</html>
