<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Cổng Học Sinh</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg-color);
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-family: inherit;
            transition: 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.1);
        }
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--accent));
            color: white;
            transition: 0.3s;
        }
        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="width: 70px; height: 70px; background: rgba(168, 85, 247, 0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; color: var(--primary-color);">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <h2 style="font-weight: 800; font-size: 1.8rem; margin-bottom: 10px;">Chào Mừng Trở Lại!</h2>
            <p style="color: var(--text-muted);">Đăng nhập vào Cổng Học Sinh của bạn</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" class="form-control" id="username" placeholder="Nhập tên tài khoản" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth" id="login-btn">ĐĂNG NHẬP</button>
        </form>

        <p style="text-align: center; margin-top: 30px; color: var(--text-muted);">
            Chưa có tài khoản? <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Đăng ký ngay</a>
        </p>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="../index.html" style="font-size: 0.85rem; color: var(--text-muted); opacity: 0.6;"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
        </div>
    </div>

    <script src="../assets/js/common.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.innerText = "ĐANG XỬ LÝ...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/students/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const student = await response.json();
                    localStorage.setItem('current_student', JSON.stringify(student));
                    window.location.href = 'student_portal.html';
                } else if (response.status === 404) {
                    alert("Tài khoản không tồn tại. Đang chuyển sang trang đăng ký!");
                    window.location.href = 'register.html?username=' + encodeURIComponent(username);
                } else {
                    const error = await response.text();
                    alert(error || "Lỗi đăng nhập!");
                }
            } catch (err) {
                alert("Không thể kết nối server!");
            } finally {
                btn.innerText = "ĐĂNG NHẬP";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
