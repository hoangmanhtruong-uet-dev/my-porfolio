# Database — Aiven MySQL (SSL bắt buộc)
# Dán password từ Aiven Console → Connection information → Password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Tăng tốc startup - giảm connection timeout để không chờ quá lâu
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=3
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port (Render gán động qua biến $PORT, local dev dùng 8080)
server.port=${PORT:8080}

# AI Configuration (Gemini API)
# Get your key at: https://aistudio.google.com/
gemini.api.key=${GEMINI_API_KEY}

# Cloudinary Configuration
# Lấy credentials tại: https://cloudinary.com → Dashboard
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}


