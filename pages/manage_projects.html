<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Dự Án Pro - Mtruong_dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --proj-primary: #3b82f6;
            --proj-secondary: #60a5fa;
            --proj-accent: #10b981;
            --proj-bg: #0b0118;
            --proj-card: rgba(30, 41, 59, 0.4);
            --proj-border: rgba(255, 255, 255, 0.1);
        }

        body.admin-mode {
            background: var(--proj-bg);
            min-height: 100vh;
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* mesh background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #0b0118;
            overflow: hidden;
        }

        .mesh-gradient {
            position: absolute;
            width: 150%; height: 150%;
            top: -25%; left: -25%;
            background-image: 
                radial-gradient(at 10% 20%, rgba(59, 130, 246, 0.2) 0px, transparent 50%),
                radial-gradient(at 90% 10%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            filter: blur(80px);
            animation: meshMove 15s infinite alternate ease-in-out;
        }

        @keyframes meshMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Login System */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid var(--proj-border);
            padding: 60px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pin-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .pin-digit {
            width: 50px; height: 65px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--proj-border);
            border-radius: 12px;
            font-size: 1.8rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .pin-digit.active { border-color: var(--proj-primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--proj-border);
            padding: 15px; border-radius: 15px; color: white; cursor: pointer; transition: 0.2s;
        }
        .num-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

        /* Dashboard */
        #dashboard-screen {
            display: none;
            padding: 100px 20px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card-pro {
            background: var(--proj-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--proj-border);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
        }

        .stat-card-pro:hover { transform: translateY(-5px); border-color: var(--proj-primary); }

        .stat-icon-pro {
            width: 60px; height: 60px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--proj-primary), var(--proj-secondary));
        }

        .stat-val { font-size: 1.8rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        /* Project Panel */
        .glass-panel-pro {
            background: var(--proj-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--proj-border);
            border-radius: 30px;
            overflow: hidden;
        }

        .panel-header-pro {
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--proj-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 20px 30px;
            font-size: 0.75rem; text-transform: uppercase;
            color: #94a3b8; letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.1);
        }
        td { padding: 20px 30px; border-bottom: 1px solid var(--proj-border); }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .tech-pill {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--proj-primary);
            border-radius: 6px;
            font-size: 0.75rem;
            margin-right: 5px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .status-badge {
            padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600;
        }
        .status-live { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-dev { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

        .btn-premium {
            background: linear-gradient(135deg, var(--proj-primary), var(--proj-secondary));
            border: none; color: white; padding: 12px 25px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e293b; border: 1px solid var(--proj-border);
            padding: 40px; border-radius: 30px; width: 100%; max-width: 500px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        .form-control {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--proj-border); border-radius: 10px; color: white;
        }

        .nav-unified-pro {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(11, 1, 24, 0.7); backdrop-filter: blur(10px);
            padding: 15px 30px; display: none; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body class="admin-mode">
    <div class="mesh-bg"><div class="mesh-gradient"></div></div>

    <nav class="nav-unified-pro" id="admin-nav">
        <div class="logo" style="font-size: 1.2rem; font-weight: 800;">
            <i class="fa-solid fa-rocket"></i> Mtruong<span>_admin</span>
        </div>
        <div style="display: flex; gap: 20px;">
            <a href="manage.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Lớp Học</a>
            <a href="manage_projects.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: 600;">Dự Án</a>
            <a href="manage_quiz.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Ngân Hàng Đề</a>
        </div>
        <button onclick="logout()" style="background: none; border: none; color: #ef4444; cursor: pointer;"><i class="fa-solid fa-sign-out-alt"></i> Thoát</button>
    </nav>

    <main class="admin-container">
        <!-- Login -->
        <div id="login-screen">
            <div class="login-glass" id="login-box">
                <div style="margin: 0 auto 30px; width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, var(--proj-primary), var(--proj-secondary)); display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h2 style="font-size: 1.8rem; font-weight: 800;">PROJECT MANAGER</h2>
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Hệ thống quản lý tài nguyên và dự án</p>
                <div class="pin-container" id="pin-display">
                    <div class="pin-digit"></div><div class="pin-digit"></div><div class="pin-digit"></div><div class="pin-digit"></div>
                </div>
                <div class="numpad">
                    <button class="num-btn" onclick="addPin('1')">1</button>
                    <button class="num-btn" onclick="addPin('2')">2</button>
                    <button class="num-btn" onclick="addPin('3')">3</button>
                    <button class="num-btn" onclick="addPin('4')">4</button>
                    <button class="num-btn" onclick="addPin('5')">5</button>
                    <button class="num-btn" onclick="addPin('6')">6</button>
                    <button class="num-btn" onclick="addPin('7')">7</button>
                    <button class="num-btn" onclick="addPin('8')">8</button>
                    <button class="num-btn" onclick="addPin('9')">9</button>
                    <button class="num-btn" style="opacity:0;"></button>
                    <button class="num-btn" onclick="addPin('0')">0</button>
                    <button class="num-btn" onclick="clearLast()"><i class="fa-solid fa-backspace"></i></button>
                </div>
                <p id="error-msg" style="color: #ef4444; margin-top: 20px; display: none;">Mã PIN không đúng!</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-screen">
            <div class="stats-row">
                <div class="stat-card-pro">
                    <div class="stat-icon-pro"><i class="fa-solid fa-layer-group"></i></div>
                    <div><span class="stat-val" id="count-total">0</span><span class="stat-label">Tổng dự án</span></div>
                </div>
                <div class="stat-card-pro">
                    <div class="stat-icon-pro" style="background: linear-gradient(135deg, #10b981, #34d399);"><i class="fa-solid fa-globe"></i></div>
                    <div><span class="stat-val" id="count-live">0</span><span class="stat-label">Đang trực tuyến</span></div>
                </div>
                <div class="stat-card-pro">
                    <div class="stat-icon-pro" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);"><i class="fa-solid fa-terminal"></i></div>
                    <div><span class="stat-val" id="count-tech">0</span><span class="stat-label">Công nghệ sử dụng</span></div>
                </div>
            </div>

            <div class="glass-panel-pro">
                <div class="panel-header-pro">
                    <h2 style="font-weight: 800; font-size: 1.4rem;"><i class="fa-solid fa-list-check"></i> DANH MỤC DỰ ÁN</h2>
                    <button class="btn-premium" onclick="openModal()"><i class="fa-solid fa-plus"></i> THÊM MỚI</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Dự án</th>
                                <th>Công nghệ</th>
                                <th>Trạng thái</th>
                                <th>Liên kết</th>
                                <th>Quản lý</th>
                            </tr>
                        </thead>
                        <tbody id="project-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 25px; font-weight: 800;">THÊM DỰ ÁN MỚI</h3>
            <form id="project-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Tên dự án</label>
                    <input type="text" id="proj-name" class="form-control" required placeholder="Ví dụ: E-commerce Web">
                </div>
                <div class="form-group">
                    <label>Công nghệ (cách nhau bởi dấu phẩy)</label>
                    <input type="text" id="proj-tech" class="form-control" required placeholder="React, Node.js, MySQL">
                </div>
                <div class="form-group">
                    <label>Mô tả ngắn</label>
                    <textarea id="proj-desc" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Đường dẫn (URL)</label>
                    <input type="text" id="proj-link" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Trạng thái</label>
                    <select id="proj-status" class="form-control">
                        <option value="Live">Trực tuyến (Live)</option>
                        <option value="Dev">Đang phát triển (Dev)</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="submit" class="btn-premium" style="flex: 1;">LƯU DỰ ÁN</button>
                    <button type="button" class="btn-premium" style="background: rgba(255,255,255,0.05); flex: 1;" onclick="closeModal()">HỦY</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const PIN = "1002";
        let enteredPin = "";
        let projects = JSON.parse(localStorage.getItem('myProjects')) || [
            { id: 1, name: "Hệ Thống Đấu Giá", tech: "Java, MySQL, Spring", desc: "Ứng dụng quản lý đấu giá trực tuyến chuyên nghiệp.", link: "auction.html", status: "Live" },
            { id: 2, name: "Personal Portfolio", tech: "HTML, CSS, JS", desc: "Website cá nhân phong cách Tech-Luxe.", link: "index.html", status: "Live" },
            { id: 3, name: "AI Chem Lab", tech: "Python, Flask, GPT", desc: "Phòng thí nghiệm hóa học tích hợp trí tuệ nhân tạo.", link: "chemlab.html", status: "Dev" }
        ];

        function addPin(num) {
            if (enteredPin.length < 4) {
                enteredPin += num;
                updatePinDisplay();
                if (enteredPin.length === 4) setTimeout(submitPin, 300);
            }
        }

        function clearLast() { enteredPin = enteredPin.slice(0, -1); updatePinDisplay(); }

        function updatePinDisplay() {
            const digits = document.querySelectorAll('.pin-digit');
            digits.forEach((d, i) => {
                if (i < enteredPin.length) { d.innerText = enteredPin[i]; d.classList.add('active'); }
                else { d.innerText = ""; d.classList.remove('active'); }
            });
            document.getElementById('error-msg').style.display = 'none';
        }

        function submitPin() {
            if (enteredPin === PIN) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                document.getElementById('admin-nav').style.display = 'flex';
                loadProjects();
            } else {
                const box = document.getElementById('login-box');
                box.style.animation = "shake 0.4s ease-in-out";
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => box.style.animation = "fadeIn 0.8s ease-out", 400);
                enteredPin = ""; updatePinDisplay();
            }
        }

        function loadProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            let techSet = new Set();

            projects.forEach(p => {
                const techList = p.tech.split(',').map(t => t.trim());
                techList.forEach(t => techSet.add(t));
                const techTags = techList.map(t => `<span class="tech-pill">${t}</span>`).join('');
                const statusCls = p.status === 'Live' ? 'status-live' : 'status-dev';
                
                list.innerHTML += `
                    <tr>
                        <td><div style="font-weight:700; font-size:1rem;">${p.name}</div><div style="font-size:0.75rem; color:#94a3b8;">${p.desc}</div></td>
                        <td>${techTags}</td>
                        <td><span class="status-badge ${statusCls}">${p.status}</span></td>
                        <td><a href="${p.link}" target="_blank" style="color:var(--proj-primary); text-decoration:none;"><i class="fa-solid fa-external-link"></i> Xem</a></td>
                        <td>
                            <button onclick="editProject(${p.id})" style="background:none; border:none; color:#3b82f6; cursor:pointer; font-size:1.1rem; margin-right:15px;"><i class="fa-solid fa-edit"></i></button>
                            <button onclick="deleteProject(${p.id})" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:1.1rem;"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('count-total').innerText = projects.length;
            document.getElementById('count-live').innerText = projects.filter(p => p.status === 'Live').length;
            document.getElementById('count-tech').innerText = techSet.size;
        }

        function openModal() {
            document.getElementById('modal-title').innerText = "THÊM DỰ ÁN MỚI";
            document.getElementById('project-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('project-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('project-modal').style.display = 'none'; }

        function editProject(id) {
            const p = projects.find(proj => proj.id === id);
            if (p) {
                document.getElementById('modal-title').innerText = "CHỈNH SỬA DỰ ÁN";
                document.getElementById('edit-id').value = p.id;
                document.getElementById('proj-name').value = p.name;
                document.getElementById('proj-tech').value = p.tech;
                document.getElementById('proj-desc').value = p.desc;
                document.getElementById('proj-link').value = p.link;
                document.getElementById('proj-status').value = p.status;
                document.getElementById('project-modal').style.display = 'flex';
            }
        }

        function deleteProject(id) {
            if (confirm('Bạn có chắc chắn muốn xóa dự án này?')) {
                projects = projects.filter(p => p.id !== id);
                saveAndReload();
            }
        }

        document.getElementById('project-form').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('proj-name').value;
            const tech = document.getElementById('proj-tech').value;
            const desc = document.getElementById('proj-desc').value;
            const link = document.getElementById('proj-link').value;
            const status = document.getElementById('proj-status').value;

            if (id) {
                const idx = projects.findIndex(p => p.id == id);
                projects[idx] = { ...projects[idx], name, tech, desc, link, status };
            } else {
                projects.push({ id: Date.now(), name, tech, desc, link, status });
            }
            saveAndReload();
            closeModal();
        };

        function saveAndReload() {
            localStorage.setItem('myProjects', JSON.stringify(projects));
            loadProjects();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
