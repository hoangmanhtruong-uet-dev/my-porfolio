<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Thư Tình Yêu ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    /* ═══════════════════ LAYOUT ═══════════════════ */
    .msg-container { max-width: 1050px; margin: 0 auto; padding: 4rem 2rem 7rem; }
    .msg-header { text-align: center; margin-bottom: 3.5rem; }
    .msg-header h2 {
        font-family: 'Pacifico', cursive;
        font-size: 3.5rem; color: #ff4d4d; margin-bottom: .6rem;
    }
    .msg-header p { font-size: 1.05rem; opacity: .75; }

    /* ═══════════════════ RANDOM QUOTE ═══════════════════ */
    .random-msg-card {
        background: rgba(255,255,255,.05);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,77,77,.3);
        border-radius: 40px;
        padding: 3rem;
        text-align: center;
        margin-bottom: 4.5rem;
        position: relative;
        overflow: hidden;
    }
    .random-msg-card::before {
        content: '\f10d';
        font-family: 'Font Awesome 6 Free'; font-weight: 900;
        position: absolute; top: 20px; left: 30px;
        font-size: 4rem; opacity: .08; color: #ff4d4d;
    }
    .quote-counter {
        position: absolute; top: 18px; right: 24px;
        font-size: .75rem; font-weight: 700;
        color: rgba(255,77,77,.5);
        background: rgba(255,77,77,.08);
        border: 1px solid rgba(255,77,77,.2);
        padding: 4px 12px; border-radius: 20px;
        letter-spacing: .04em;
    }
    #random-quote {
        font-size: 1.7rem; font-weight: 600;
        line-height: 1.6; font-style: italic; color: #fff;
        min-height: 3rem;
        transition: opacity .4s;
    }
    .action-btn {
        background: #ff4d4d; color: white; border: 1px solid #ff4d4d;
        padding: 12px 24px; border-radius: 100px; cursor: pointer;
        font-weight: 700; display: inline-flex; align-items: center; gap: 9px;
        transition: .3s; font-family: 'Outfit', sans-serif; font-size: .95rem;
    }
    .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,77,77,.4); }
    .action-btn.outline {
        background: transparent; border-color: rgba(255,255,255,.2); color: white;
    }
    .action-btn.outline:hover { border-color: white; background: rgba(255,255,255,.1); box-shadow: none; }

    /* ═══════════════════ ENVELOPE GRID ═══════════════════ */
    .secret-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
        gap: 1.8rem;
    }

    /* ── base card ── */
    .envelope-card {
        background: rgba(255,255,255,.03);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 30px;
        padding: 2.4rem;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: all .4s cubic-bezier(.175,.885,.32,1.275);
        cursor: pointer;
    }

    /* ── LOCKED state ── */
    .envelope-card.locked {
        opacity: .72;
        cursor: default;
    }
    .envelope-card.locked:hover {
        transform: translateY(-6px);
        border-color: rgba(255,200,100,.4);
        background: rgba(255,200,100,.04);
    }
    .envelope-card.locked.shake {
        animation: shake .5s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
        10%,90%  { transform: translateX(-2px); }
        20%,80%  { transform: translateX(4px); }
        30%,50%,70% { transform: translateX(-6px); }
        40%,60%  { transform: translateX(6px); }
    }

    /* ── UNLOCKED state ── */
    .envelope-card.unlocked {
        cursor: pointer;
    }
    .envelope-card.unlocked:hover {
        transform: translateY(-10px);
        border-color: #ff4d4d;
        background: rgba(255,77,77,.06);
        box-shadow: 0 20px 45px rgba(255,77,77,.15);
    }

    /* envelope icon */
    .envelope-icon-wrap { position: relative; display: inline-block; margin-bottom: 1.2rem; }
    .envelope-icon { font-size: 3.5rem; transition: .4s; }
    .envelope-card.locked   .envelope-icon { color: #fbbf24; filter: drop-shadow(0 0 6px rgba(251,191,36,.3)); }
    .envelope-card.unlocked .envelope-icon {
        color: #ff4d4d;
        animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
        0%,100% { filter: drop-shadow(0 0 6px rgba(255,77,77,.4)); }
        50%     { filter: drop-shadow(0 0 20px rgba(255,77,77,.9)); }
    }

    /* floating hearts from unlocked envelope */
    .heart-float {
        position: absolute;
        pointer-events: none;
        font-size: .85rem;
        color: #ff4d4d;
        bottom: 0;
        animation: floatHeart 2.2s ease-in forwards;
        opacity: 0;
    }
    @keyframes floatHeart {
        0%   { opacity: .9; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-55px) scale(.5); }
    }

    .unlock-date {
        font-size: .82rem; font-weight: 800;
        color: #ff4d4d; margin-bottom: 4px; display: block;
    }
    .envelope-card.locked .unlock-date { color: #fbbf24; }
    .env-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; }

    /* countdown timer */
    .countdown-timer {
        display: flex; justify-content: center; gap: .5rem;
        margin: .8rem 0 .5rem; flex-wrap: wrap;
    }
    .cd-unit {
        background: rgba(251,191,36,.1);
        border: 1px solid rgba(251,191,36,.25);
        border-radius: 10px;
        padding: 6px 10px;
        min-width: 52px;
    }
    .cd-num {
        font-size: 1.3rem; font-weight: 900;
        color: #fbbf24; display: block; line-height: 1;
    }
    .cd-lbl { font-size: .6rem; opacity: .6; text-transform: uppercase; letter-spacing: .06em; }

    .env-status { font-size: .8rem; opacity: .6; }
    .env-open-btn {
        margin-top: 1rem;
        background: linear-gradient(135deg,#ff4d4d,#f43f5e);
        color: white; border: none; padding: 10px 24px;
        border-radius: 100px; font-weight: 800; font-size: .9rem;
        cursor: pointer; transition: .3s;
        box-shadow: 0 6px 18px rgba(255,77,77,.35);
    }
    .env-open-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

    /* trash icon */
    .env-del {
        position: absolute; top: 14px; right: 14px;
        opacity: 0; transition: .3s; color: rgba(255,255,255,.3); cursor: pointer;
        font-size: .85rem; padding: 4px;
    }
    .envelope-card:hover .env-del { opacity: 1; }
    .env-del:hover { color: #ff4d4d; }

    /* ═══════════════════ FLOATING ADD BTN ═══════════════════ */
    .add-msg-btn {
        position: fixed; bottom: 40px; right: 40px;
        width: 65px; height: 65px;
        background: #ff4d4d; color: white; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        font-size: 1.8rem;
        box-shadow: 0 10px 25px rgba(255,77,77,.5);
        cursor: pointer; z-index: 2000; border: none; transition: .35s;
    }
    .add-msg-btn:hover { transform: scale(1.12) rotate(15deg); }
    .add-msg-btn.sending { animation: planeGo .6s ease-in forwards; }
    @keyframes planeGo {
        0%   { transform: scale(1) rotate(0deg); opacity: 1; }
        60%  { transform: translate(60vw,-60vh) rotate(-30deg) scale(.3); opacity: .6; }
        100% { transform: translate(60vw,-60vh) scale(0); opacity: 0; }
    }

    /* ═══════════════════ LETTER FLIP MODAL ═══════════════════ */
    .letter-modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.88);
        backdrop-filter: blur(18px);
        display: none; justify-content: center; align-items: center;
        z-index: 5000; padding: 20px;
    }
    .letter-scene {
        perspective: 1200px;
        width: 100%; max-width: 500px;
    }
    .letter-card {
        width: 100%; min-height: 380px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform .9s cubic-bezier(.4,0,.2,1);
        cursor: pointer;
    }
    .letter-card.flipped { transform: rotateY(180deg); }

    /* front = envelope */
    .letter-front, .letter-back {
        position: absolute; width: 100%; min-height: 380px;
        backface-visibility: hidden;
        border-radius: 30px;
        padding: 2.5rem;
        text-align: center;
        border: 1px solid rgba(255,77,77,.35);
    }
    .letter-front {
        background: linear-gradient(145deg,#1a0b2e,#200d35);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.2rem;
    }
    .letter-back {
        background: linear-gradient(145deg,#1e1040,#241348);
        transform: rotateY(180deg);
        display: flex; flex-direction: column; gap: 1.2rem;
        text-align: left;
        overflow-y: auto;
    }

    /* Envelope flap animation on front */
    .env-flap {
        font-size: 5rem; color: #ff4d4d;
        animation: glowPulse 2s ease-in-out infinite;
    }
    .flip-hint { font-size: .8rem; opacity: .45; margin-top: .5rem; }

    /* Letter paper inside */
    .letter-paper {
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 20px;
        padding: 1.8rem;
        flex: 1;
    }
    .letter-title-display {
        color: #ff4d4d; font-size: 1.5rem; font-weight: 800;
        margin-bottom: 1rem;
    }
    .letter-content-display {
        font-family: 'Dancing Script', cursive;
        font-size: 1.25rem; line-height: 1.85;
        color: #f1f5f9;
        white-space: pre-wrap;
    }
    .letter-date-display {
        font-size: .78rem; color: #fda4af; opacity: .7;
        text-align: right; margin-top: .8rem;
    }
    .letter-close-btn {
        background: rgba(255,77,77,.12); border: 1px solid rgba(255,77,77,.3);
        color: #ff4d4d; padding: 10px 24px; border-radius: 100px;
        font-weight: 700; cursor: pointer; transition: .3s;
        align-self: center;
    }
    .letter-close-btn:hover { background: #ff4d4d; color: white; }

    /* ═══════════════════ ADD MESSAGE MODAL ═══════════════════ */
    .add-modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.88); backdrop-filter: blur(14px);
        display: none; justify-content: center; align-items: center;
        z-index: 4000; padding: 20px;
    }

    /* looks like a letter paper */
    .add-modal-paper {
        background: linear-gradient(145deg,#1e1040,#271450);
        border: 1px solid rgba(255,77,77,.35);
        border-radius: 35px;
        width: 100%; max-width: 500px;
        max-height: 92vh; overflow-y: auto;
        padding: 2.8rem;
        position: relative;
        box-shadow: 0 40px 100px rgba(0,0,0,.6);
        animation: slideUp .35s ease;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px) scale(.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .add-modal-paper::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 5px;
        background: linear-gradient(90deg,#ff4d4d,#f43f5e,#fda4af);
        border-radius: 35px 35px 0 0;
    }
    .add-modal-paper h3 {
        color: #ff4d4d; font-size: 1.7rem; text-align: center; margin-bottom: .3rem;
    }
    .add-modal-paper > p {
        text-align: center; opacity: .55; font-size: .88rem; margin-bottom: 2rem;
    }
    .am-label {
        display: block; font-size: .73rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: .07em;
        color: rgba(255,255,255,.4); margin-bottom: 5px;
    }
    .modal-input {
        width: 100%; background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.12);
        color: white; padding: 13px 16px; border-radius: 14px;
        margin-bottom: 1.1rem; font-family: 'Outfit', sans-serif;
        font-size: .97rem; box-sizing: border-box; outline: none;
        transition: border-color .2s;
    }
    .modal-input:focus {
        border-color: rgba(255,77,77,.6);
        background: rgba(255,77,77,.05);
        box-shadow: 0 0 15px rgba(255,77,77,.12);
    }
    .modal-input::placeholder { color: rgba(255,255,255,.22); }
    .modal-input::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
    textarea.modal-input { height: 140px; resize: none; font-family: 'Dancing Script',cursive; font-size: 1.1rem; }
    .add-modal-actions { display: flex; gap: .9rem; margin-top: .5rem; }
    </style>
</head>

<body class="love-page-body">

<!-- Widgets -->
<div class="dark-mode-toggle" onclick="toggleDarkMode()">
    <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
</div>
<div class="music-player">
    <i class="fa-solid fa-play music-btn" id="play-pause" onclick="toggleMusic()"></i>
    <span id="song-title">Perfect - Ed Sheeran ❤️</span>
    <audio id="bg-music" loop>
        <source src="https://github.com/hoangtran0410/Pretty-In-Love/blob/master/music/perfect.mp3?raw=true" type="audio/mpeg">
    </audio>
</div>
<div class="back-nav">
    <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
</div>

<main class="msg-container">
    <div class="msg-header">
        <h2>Hộp Thư Tình Yêu</h2>
        <p>Gửi những lời nhắn bí mật cho tương lai ✨</p>
    </div>

    <!-- ── Random Quote ── -->
    <div class="random-msg-card">
        <span class="quote-counter" id="quote-counter">#1 / #5</span>
        <p id="random-quote">Đang tải lời nhắn ngọt ngào...</p>
        <button class="action-btn" style="margin: 2rem auto 0;" onclick="showRandomQuote()">
            <i class="fa-solid fa-shuffle"></i> Xem lời nhắn khác
        </button>
    </div>

    <!-- ── Timed Letters ── -->
    <h3 style="font-size:2rem;color:#ff4d4d;text-align:center;margin-bottom:2.5rem;">
        Thư Hẹn Giờ 💌
    </h3>
    <div id="secret-grid" class="secret-grid"></div>
</main>

<!-- Floating add button -->
<button class="add-msg-btn" id="add-msg-btn" onclick="openAddModal()" title="Viết thư mới">
    <i class="fa-solid fa-paper-plane"></i>
</button>

<!-- ── Letter flip / read modal ── -->
<div id="letter-modal" class="letter-modal-overlay" onclick="closeLetterModal(event)">
    <div class="letter-scene">
        <div class="letter-card" id="letter-card" onclick="event.stopPropagation(); flipCard()">
            <!-- Front: envelope -->
            <div class="letter-front">
                <i class="fa-solid fa-envelope-open-text env-flap"></i>
                <h3 id="modal-letter-title" style="color:#ff4d4d;font-size:1.5rem;margin:0"></h3>
                <p id="modal-letter-date" style="font-size:.82rem;opacity:.55;margin:0"></p>
                <p class="flip-hint"><i class="fa-solid fa-rotate" style="margin-right:5px"></i>Nhấn để lật và đọc thư</p>
            </div>
            <!-- Back: letter paper -->
            <div class="letter-back">
                <div class="letter-paper">
                    <div class="letter-title-display" id="modal-back-title"></div>
                    <div class="letter-content-display" id="modal-back-content"></div>
                    <div class="letter-date-display" id="modal-back-date"></div>
                </div>
                <button class="letter-close-btn" onclick="closeLetterModalDirect()">
                    <i class="fa-solid fa-envelope" style="margin-right:7px"></i>Gấp thư lại
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ── Add message modal ── -->
<div id="add-msg-modal" class="add-modal-overlay" onclick="closeAddModal(event)">
    <div class="add-modal-paper" onclick="event.stopPropagation()">
        <div style="text-align:center;margin-bottom:1.8rem">
            <i class="fa-solid fa-paper-plane" style="font-size:2.5rem;color:#ff4d4d;margin-bottom:.7rem;display:block"></i>
            <h3>Gửi thư cho tương lai</h3>
            <p>Viết những tâm tư cho một ngày đặc biệt</p>
        </div>

        <label class="am-label"><i class="fa-solid fa-heading" style="margin-right:5px"></i>Tiêu đề lá thư</label>
        <input type="text" id="new-msg-title" class="modal-input" placeholder="VD: Gửi em ngày Valentine…">

        <label class="am-label"><i class="fa-solid fa-calendar-day" style="margin-right:5px"></i>Ngày mở thư</label>
        <input type="date" id="new-msg-date" class="modal-input">

        <label class="am-label"><i class="fa-solid fa-pen-nib" style="margin-right:5px"></i>Nội dung (viết tay)</label>
        <textarea id="new-msg-content" class="modal-input" placeholder="Viết những gì bạn muốn nói…"></textarea>

        <div class="add-modal-actions">
            <button class="action-btn" style="flex:1;justify-content:center" onclick="saveNewMessage()">
                <i class="fa-solid fa-paper-plane"></i> Gửi vào tương lai
            </button>
            <button class="action-btn outline" style="flex:1;justify-content:center" onclick="closeAddModalDirect()">
                <i class="fa-solid fa-xmark"></i> Hủy
            </button>
        </div>
    </div>
</div>


<script>
/* ════════════════════════════════════════════
   DATA
════════════════════════════════════════════ */
const QUOTES = [
    "Anh yêu em nhiều hơn cả những gì anh có thể nói ❤️",
    "Cảm ơn em đã bước vào cuộc đời anh và làm nó trở nên rực rỡ hơn ✨",
    "Dù cả thế giới có quay lưng lại, anh vẫn sẽ luôn ở đây bên em.",
    "Em là điều tuyệt vời nhất mà định mệnh đã dành tặng cho anh.",
    "Tình yêu không phải là tìm thấy một người hoàn hảo, mà là học cách nhìn thấy những điều hoàn hảo từ một người không hoàn hảo.",
    "Mỗi buổi sáng thức dậy, điều đầu tiên anh nghĩ đến là em.",
    "Em không cần phải hoàn hảo — với anh, em đã hoàn hảo rồi 🌸",
    "Khoảng cách chỉ là con số, trái tim chúng mình luôn ở bên nhau."
];

let currentQuoteIdx = 0;

let secretMessages = JSON.parse(localStorage.getItem('loveTimedMessages')) || [
    { id: 1, title: "Ngày Valentine", date: "2026-02-14",
      content: "Chúc mừng lễ tình nhân đầu tiên của chúng mình!\nMong chúng mình mãi hạnh phúc như thế này nhé ❤️",
      unlocked: false },
    { id: 2, title: "Sinh nhật Em",  date: "2026-05-20",
      content: "Chúc mừng sinh nhật công chúa của anh!\nChúc em luôn xinh đẹp, rạng rỡ và yêu anh nhiều hơn mỗi ngày ✨",
      unlocked: false }
];

/* ════════════════════════════════════════════
   RANDOM QUOTE
════════════════════════════════════════════ */
function showRandomQuote() {
    const el    = document.getElementById('random-quote');
    const ctr   = document.getElementById('quote-counter');
    el.style.opacity = '0';
    setTimeout(() => {
        currentQuoteIdx = (currentQuoteIdx + 1) % QUOTES.length;
        el.textContent   = QUOTES[currentQuoteIdx];
        el.style.opacity = '1';
        // show all quotes including custom ones stored in localStorage
        const customQuotes = JSON.parse(localStorage.getItem('loveCustomQuotes') || '[]');
        const total = QUOTES.length + customQuotes.length;
        ctr.textContent = `#${currentQuoteIdx + 1} / #${total}`;
    }, 400);
}

function initRandomQuote() {
    const customQuotes = JSON.parse(localStorage.getItem('loveCustomQuotes') || '[]');
    const allQ = [...QUOTES, ...customQuotes];
    currentQuoteIdx = Math.floor(Math.random() * allQ.length);
    document.getElementById('random-quote').textContent = allQ[currentQuoteIdx];
    document.getElementById('quote-counter').textContent = `#${currentQuoteIdx + 1} / #${allQ.length}`;
}

/* ════════════════════════════════════════════
   COUNTDOWN TIMER
════════════════════════════════════════════ */
const countdownIntervals = {};

function startCountdown(id, unlockDate) {
    if (countdownIntervals[id]) clearInterval(countdownIntervals[id]);

    function tick() {
        const diff = unlockDate - Date.now();
        if (diff <= 0) {
            clearInterval(countdownIntervals[id]);
            renderMessages();
            return;
        }
        const days = Math.floor(diff / 86400000);
        const hrs  = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000)  / 60000);
        const secs = Math.floor((diff % 60000)    / 1000);

        const el = document.getElementById(`cd-${id}`);
        if (el) {
            el.innerHTML = `
                <div class="cd-unit"><span class="cd-num">${String(days).padStart(2,'0')}</span><span class="cd-lbl">ngày</span></div>
                <div class="cd-unit"><span class="cd-num">${String(hrs).padStart(2,'0')}</span><span class="cd-lbl">giờ</span></div>
                <div class="cd-unit"><span class="cd-num">${String(mins).padStart(2,'0')}</span><span class="cd-lbl">phút</span></div>
                <div class="cd-unit"><span class="cd-num">${String(secs).padStart(2,'0')}</span><span class="cd-lbl">giây</span></div>`;
        }
    }
    tick();
    countdownIntervals[id] = setInterval(tick, 1000);
}

/* ════════════════════════════════════════════
   RENDER ENVELOPES
════════════════════════════════════════════ */
function renderMessages() {
    const grid = document.getElementById('secret-grid');
    const now  = Date.now();

    grid.innerHTML = secretMessages.map(m => {
        const unlockTs = new Date(m.date + 'T00:00:00').getTime();
        const isLocked = now < unlockTs;

        if (isLocked) {
            return `
            <div class="envelope-card locked" id="env-${m.id}" onclick="tryOpen(${m.id})">
                <div class="envelope-icon-wrap">
                    <div class="envelope-icon"><i class="fa-solid fa-envelope"></i></div>
                </div>
                <span class="unlock-date">🔒 ${fmtDate(m.date)}</span>
                <h3 class="env-title">${m.title}</h3>
                <div class="countdown-timer" id="cd-${m.id}">
                    <span style="opacity:.4;font-size:.8rem">Đang đếm ngược…</span>
                </div>
                <p class="env-status">Chưa đến ngày mở</p>
            </div>`;
        } else {
            return `
            <div class="envelope-card unlocked" id="env-${m.id}" onclick="openLetter(${m.id})">
                <div class="envelope-icon-wrap" id="eiwrap-${m.id}">
                    <div class="envelope-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
                </div>
                <span class="unlock-date">${fmtDate(m.date)}</span>
                <h3 class="env-title">${m.title}</h3>
                <p class="env-status"><i class="fa-solid fa-lock-open" style="margin-right:5px"></i>Sẵn sàng rồi nè!</p>
                <button class="env-open-btn">💌 Mở thư ngay</button>
                <i class="fa-solid fa-trash-can env-del" onclick="deleteMsg(event,${m.id})"></i>
            </div>`;
        }
    }).join('');

    // start countdowns for locked letters
    secretMessages.forEach(m => {
        const unlockTs = new Date(m.date + 'T00:00:00').getTime();
        if (Date.now() < unlockTs) startCountdown(m.id, unlockTs);
    });

    // floating hearts for unlocked
    secretMessages.forEach(m => {
        const unlockTs = new Date(m.date + 'T00:00:00').getTime();
        if (Date.now() >= unlockTs) spawnHearts(m.id);
    });

    localStorage.setItem('loveTimedMessages', JSON.stringify(secretMessages));
}

function spawnHearts(id) {
    const wrap = document.getElementById(`eiwrap-${id}`);
    if (!wrap) return;
    const hearts = ['❤️','💕','💖','💗'];
    setInterval(() => {
        const h = document.createElement('span');
        h.className = 'heart-float';
        h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
        h.style.left = (20 + Math.random()*60) + '%';
        h.style.animationDuration = (1.8 + Math.random()) + 's';
        h.style.fontSize = (.6 + Math.random()*.5) + 'rem';
        wrap.appendChild(h);
        setTimeout(() => h.remove(), 2500);
    }, 900);
}

function fmtDate(d) {
    const [y,mo,da] = d.split('-');
    return `${da}/${mo}/${y}`;
}
</script>

<script>
/* ════════════════════════════════════════════
   OPEN / SHAKE
════════════════════════════════════════════ */
function tryOpen(id) {
    const card = document.getElementById(`env-${id}`);
    if (!card) return;
    // shake + toast
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    showToast('Chưa đến ngày mà, tò mò quá đi! 🤫', '#fbbf24');
}

function openLetter(id) {
    const m = secretMessages.find(x => x.id === id);
    if (!m) return;

    // reset flip
    const lc = document.getElementById('letter-card');
    lc.classList.remove('flipped');

    document.getElementById('modal-letter-title').textContent  = m.title;
    document.getElementById('modal-letter-date').textContent   = '📅 ' + fmtDate(m.date);
    document.getElementById('modal-back-title').textContent    = m.title;
    document.getElementById('modal-back-content').textContent  = m.content;
    document.getElementById('modal-back-date').textContent     = 'Gửi ngày ' + fmtDate(m.date);

    document.getElementById('letter-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function flipCard() {
    document.getElementById('letter-card').classList.toggle('flipped');
}

function closeLetterModal(e) {
    if (e && e.target !== document.getElementById('letter-modal')) return;
    closeLetterModalDirect();
}
function closeLetterModalDirect() {
    document.getElementById('letter-modal').style.display = 'none';
    document.body.style.overflow = '';
}

/* ════════════════════════════════════════════
   ADD / SAVE  (with paper-plane send animation)
════════════════════════════════════════════ */
function openAddModal() {
    document.getElementById('add-msg-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // set default date to tomorrow
    const tmr = new Date(Date.now() + 86400000);
    document.getElementById('new-msg-date').value = tmr.toISOString().split('T')[0];
    setTimeout(() => document.getElementById('new-msg-title').focus(), 100);
}

function closeAddModal(e) {
    if (e && e.target !== document.getElementById('add-msg-modal')) return;
    closeAddModalDirect();
}
function closeAddModalDirect() {
    document.getElementById('add-msg-modal').style.display = 'none';
    document.body.style.overflow = '';
}

function saveNewMessage() {
    const title   = document.getElementById('new-msg-title').value.trim();
    const date    = document.getElementById('new-msg-date').value;
    const content = document.getElementById('new-msg-content').value.trim();
    if (!title || !date || !content) {
        showToast('Vui lòng điền đầy đủ thông tin thư! 📝', '#ef4444');
        return;
    }

    // paper-plane send effect on FAB
    const fab = document.getElementById('add-msg-btn');
    fab.classList.add('sending');
    fab.style.pointerEvents = 'none';

    setTimeout(() => {
        secretMessages.push({ id: Date.now(), title, date, content });
        renderMessages();
        closeAddModalDirect();
        // clear form
        ['new-msg-title','new-msg-date','new-msg-content'].forEach(id => {
            document.getElementById(id).value = '';
        });
        // restore FAB
        fab.classList.remove('sending');
        fab.style.cssText = '';
        fab.style.pointerEvents = '';
        showToast('Thư đã bay về tương lai! ✈️', '#4ade80');
    }, 650);
}

function deleteMsg(e, id) {
    e.stopPropagation();
    if (confirm('Xóa lá thư này?')) {
        secretMessages = secretMessages.filter(m => m.id !== id);
        renderMessages();
    }
}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, color = '#ff4d4d') {
    let t = document.getElementById('love-toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'love-toast';
        Object.assign(t.style, {
            position:'fixed', bottom:'110px', left:'50%',
            transform:'translateX(-50%)',
            background: color, color:'#fff',
            padding:'12px 24px', borderRadius:'100px',
            fontWeight:'700', fontSize:'.9rem',
            zIndex:'9999', pointerEvents:'none',
            opacity:'0', transition:'opacity .3s, bottom .3s',
            whiteSpace:'nowrap'
        });
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = color;
    t.style.opacity = '1';
    t.style.bottom  = '120px';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.bottom  = '110px';
    }, 2800);
}

/* ════════════════════════════════════════════
   DARK MODE / MUSIC
════════════════════════════════════════════ */
function toggleDarkMode() {
    document.body.classList.toggle('light-mode');
    document.getElementById('dark-mode-icon').className =
        document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
const audio = document.getElementById('bg-music');
function toggleMusic() {
    if (audio.paused) {
        audio.play();
        document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn';
    } else {
        audio.pause();
        document.getElementById('play-pause').className = 'fa-solid fa-play music-btn';
    }
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
window.onload = () => {
    initRandomQuote();
    renderMessages();
};
</script>
</body>
</html>
