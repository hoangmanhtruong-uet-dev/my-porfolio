<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket List - Những Ước Mơ Chung ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    /* ═══════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════ */
    .bucket-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 4rem 2rem 6rem;
    }
    .bucket-header {
        text-align: center;
        margin-bottom: 1.5rem;
    }
    .bucket-header h2 {
        font-family: 'Pacifico', cursive;
        font-size: 3.5rem;
        color: #ff4d4d;
        margin-bottom: .6rem;
    }
    .bucket-header p { font-size: 1.05rem; opacity: .75; }

    /* ── overall progress ── */
    .overall-progress {
        max-width: 480px;
        margin: 0 auto 3rem;
        text-align: center;
    }
    .overall-progress .op-label {
        font-size: .85rem;
        opacity: .55;
        margin-bottom: .5rem;
        letter-spacing: .04em;
        text-transform: uppercase;
    }
    .overall-progress .op-track {
        height: 7px;
        background: rgba(255,255,255,.08);
        border-radius: 10px;
        overflow: hidden;
    }
    .overall-progress .op-fill {
        height: 100%;
        background: linear-gradient(90deg,#ff4d4d,#f43f5e,#fb7185);
        border-radius: 10px;
        transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .overall-progress .op-num {
        margin-top: .5rem;
        font-size: .8rem;
        color: #fda4af;
        font-weight: 700;
    }

    /* ── grid ── */
    .bucket-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
        gap: 1.8rem;
        align-items: start;
    }

    /* ═══════════════════════════════════════════
       CATEGORY CARD
    ═══════════════════════════════════════════ */
    .bucket-category {
        background: rgba(255,255,255,.03);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 32px;
        padding: 2.2rem;
        position: relative;
        transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    .bucket-category:hover {
        transform: translateY(-8px);
        border-color: rgba(255,77,77,.35);
        box-shadow: 0 20px 50px rgba(255,77,77,.12);
    }

    /* category header */
    .category-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: .8rem;
    }
    .category-title {
        display: flex;
        align-items: center;
        gap: .7rem;
        font-size: 1.3rem;
        font-weight: 800;
        color: #ff4d4d;
    }
    .edit-controls {
        display: flex;
        gap: 8px;
        opacity: .25;
        transition: .3s;
    }
    .bucket-category:hover .edit-controls { opacity: 1; }
    .edit-btn {
        background: none; border: none;
        color: rgba(255,255,255,.6);
        cursor: pointer; font-size: .95rem;
        transition: .2s;
    }
    .edit-btn:hover { color: #ff4d4d; }

    /* ── per-category progress bar ── */
    .cat-progress-wrap {
        margin-bottom: 1.2rem;
    }
    .cat-progress-info {
        display: flex;
        justify-content: space-between;
        font-size: .72rem;
        opacity: .5;
        margin-bottom: 4px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
    }
    .cat-progress-track {
        height: 5px;
        background: rgba(255,255,255,.07);
        border-radius: 10px;
        overflow: hidden;
    }
    .cat-progress-fill {
        height: 100%;
        background: linear-gradient(90deg,#ff4d4d,#f43f5e);
        border-radius: 10px;
        transition: width .7s cubic-bezier(.4,0,.2,1);
    }

    /* ═══════════════════════════════════════════
       BUCKET ITEMS
    ═══════════════════════════════════════════ */
    .bucket-list { list-style: none; padding: 0; }

    .bucket-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding: 11px 0;
        border-bottom: 1px solid rgba(255,255,255,.04);
        position: relative;
    }

    .bucket-item-content {
        display: flex;
        align-items: flex-start;
        gap: 11px;
        cursor: pointer;
        flex: 1;
        min-width: 0;
    }

    /* checkbox circle */
    .check-circle {
        width: 26px; height: 26px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,.25);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: .85rem;
        transition: all .35s cubic-bezier(.4,0,.2,1);
        margin-top: 1px;
        background: transparent;
    }
    .bucket-item.done .check-circle {
        background: linear-gradient(135deg,#ff4d4d,#f43f5e);
        border-color: transparent;
        box-shadow: 0 0 12px rgba(255,77,77,.5);
        animation: popIn .35s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
        0%   { transform: scale(0); }
        60%  { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    /* item text block */
    .item-body { flex: 1; min-width: 0; }
    .item-text {
        font-size: 1rem;
        line-height: 1.4;
        transition: all .3s;
        display: block;
    }
    .bucket-item.done .item-text {
        opacity: .4;
        text-decoration: line-through;
        text-decoration-color: rgba(255,77,77,.6);
    }
    .item-done-date {
        display: none;
        font-size: .72rem;
        color: #fda4af;
        margin-top: 3px;
        font-style: italic;
    }
    .bucket-item.done .item-done-date { display: block; }

    /* photo thumbnail on hover */
    .item-photo-preview {
        position: absolute;
        right: 34px;
        top: 50%;
        transform: translateY(-50%) scale(.8);
        width: 64px; height: 64px;
        border-radius: 12px;
        object-fit: cover;
        border: 2px solid rgba(255,77,77,.5);
        box-shadow: 0 6px 20px rgba(0,0,0,.5);
        opacity: 0;
        pointer-events: none;
        transition: all .3s cubic-bezier(.4,0,.2,1);
        z-index: 10;
    }
    .bucket-item:hover .item-photo-preview {
        opacity: 1;
        transform: translateY(-50%) scale(1);
    }

    /* upload icon (visible on done items) */
    .upload-photo-btn {
        opacity: 0;
        transition: .3s;
        color: rgba(255,255,255,.3);
        cursor: pointer;
        font-size: .85rem;
        flex-shrink: 0;
        padding: 4px;
    }
    .bucket-item.done:hover .upload-photo-btn { opacity: 1; color: #fda4af; }
    .upload-photo-input { display: none; }

    .delete-item-btn {
        opacity: 0;
        transition: .3s;
        color: rgba(255,255,255,.2);
        cursor: pointer;
        font-size: .8rem;
        flex-shrink: 0;
        padding: 4px;
    }
    .bucket-item:hover .delete-item-btn { opacity: 1; }
    .delete-item-btn:hover { color: #ff4d4d; }

    /* ── add item trigger ── */
    .add-item-trigger {
        margin-top: 1.2rem;
        width: 100%;
        padding: 9px;
        background: rgba(255,255,255,.04);
        border: 1px dashed rgba(255,255,255,.15);
        border-radius: 14px;
        color: rgba(255,255,255,.4);
        cursor: pointer;
        font-size: .88rem;
        transition: .3s;
        box-sizing: border-box;
    }
    .add-item-trigger:hover {
        background: rgba(255,255,255,.08);
        color: white;
        border-color: #ff4d4d;
    }

    /* ── add category card ── */
    .add-cat-card {
        background: rgba(255,77,77,.03);
        border: 2px dashed rgba(255,77,77,.2);
        border-radius: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: .8rem;
        min-height: 180px;
        cursor: pointer;
        transition: .35s;
        color: rgba(255,77,77,.45);
    }
    .add-cat-card:hover {
        border-color: #ff4d4d;
        background: rgba(255,77,77,.07);
        color: #ff4d4d;
        transform: translateY(-6px);
    }
    .add-cat-card i  { font-size: 2.2rem; }
    .add-cat-card span { font-size: .95rem; font-weight: 700; }

    /* ═══════════════════════════════════════════
       GLOBAL ACTIONS
    ═══════════════════════════════════════════ */
    .global-actions {
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        margin-top: 3rem;
        flex-wrap: wrap;
    }
    .action-btn {
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.1);
        color: white;
        padding: 11px 22px;
        border-radius: 100px;
        cursor: pointer;
        font-weight: 600;
        font-size: .9rem;
        display: flex;
        align-items: center;
        gap: 9px;
        transition: .3s;
    }
    .action-btn:hover { background: #ff4d4d; transform: translateY(-2px); }

    /* ═══════════════════════════════════════════
       MODALS
    ═══════════════════════════════════════════ */
    .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.78);
        backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 4000;
        padding: 20px;
    }
    .modal-card {
        background: linear-gradient(145deg,#1a0b2e,#1e1040);
        padding: 2.5rem;
        border-radius: 28px;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(255,77,77,.3);
        box-shadow: 0 30px 80px rgba(0,0,0,.6);
        animation: modalSlide .3s ease;
    }
    @keyframes modalSlide {
        from { opacity: 0; transform: translateY(20px) scale(.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-card h3 { margin-bottom: 1.3rem; color: #ff4d4d; font-size: 1.35rem; }
    .modal-input {
        width: 100%;
        background: rgba(255,255,255,.07);
        border: 1px solid rgba(255,255,255,.12);
        color: white;
        padding: 12px 15px;
        border-radius: 14px;
        margin-bottom: 1.3rem;
        font-size: .95rem;
        box-sizing: border-box;
        outline: none;
        transition: border-color .2s;
    }
    .modal-input:focus { border-color: rgba(255,77,77,.6); background: rgba(255,77,77,.05); }
    .modal-input::placeholder { color: rgba(255,255,255,.25); }
    .icon-picker {
        display: flex;
        gap: .5rem;
        flex-wrap: wrap;
        margin-bottom: 1.3rem;
    }
    .icon-opt {
        width: 40px; height: 40px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.1);
        background: rgba(255,255,255,.04);
        color: rgba(255,255,255,.6);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem;
        transition: .2s;
    }
    .icon-opt.selected, .icon-opt:hover {
        background: rgba(255,77,77,.2);
        border-color: #ff4d4d;
        color: #ff4d4d;
    }
    .modal-actions { display: flex; gap: .8rem; }
    .btn-primary {
        flex: 1; padding: 12px; border: none; border-radius: 14px;
        background: linear-gradient(135deg,#ff4d4d,#f43f5e);
        color: #fff; font-weight: 700; cursor: pointer;
        box-shadow: 0 6px 20px rgba(255,77,77,.3); transition: .25s;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-ghost {
        flex: 1; padding: 12px; border-radius: 14px;
        border: 1px solid rgba(255,255,255,.12);
        background: transparent; color: rgba(255,255,255,.5);
        font-weight: 600; cursor: pointer; transition: .25s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,.3); color: #fff; }

    /* ═══════════════════════════════════════════
       CONFETTI CANVAS
    ═══════════════════════════════════════════ */
    #confetti-canvas {
        position: fixed; inset: 0;
        pointer-events: none;
        z-index: 9999;
    }
    </style>
</head>

<body class="love-page-body">

<!-- Confetti canvas (invisible until triggered) -->
<canvas id="confetti-canvas"></canvas>

<!-- Global Widgets -->
<div class="dark-mode-toggle" onclick="toggleDarkMode()">
    <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
</div>
<div class="music-player">
    <i class="fa-solid fa-play music-btn" id="play-pause" onclick="toggleMusic()"></i>
    <span id="song-title">Perfect - Ed Sheeran ❤️</span>
    <audio id="bg-music" loop>
        <source src="https://github.com/hoangtran0410/Pretty-In-Love/blob/master/music/perfect.mp3?raw=true" type="audio/mpeg">
    </audio>
</div>
<div class="back-nav">
    <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
</div>

<main class="bucket-container">
    <div class="bucket-header">
        <h2>Bucket List</h2>
        <p>Những điều tuyệt vời chúng mình sẽ cùng làm ❤️</p>
    </div>

    <!-- Overall progress -->
    <div class="overall-progress">
        <div class="op-label">Tiến độ chung</div>
        <div class="op-track"><div class="op-fill" id="op-fill" style="width:0%"></div></div>
        <div class="op-num" id="op-num">0 / 0 mục tiêu hoàn thành</div>
    </div>

    <div id="bucket-grid" class="bucket-grid"></div>

    <div class="global-actions">
        <button class="action-btn" onclick="openCategoryModal()">
            <i class="fa-solid fa-plus"></i> Thêm danh mục mới
        </button>
        <button class="action-btn" onclick="resetBucketList()">
            <i class="fa-solid fa-rotate-left"></i> Cài lại mặc định
        </button>
    </div>
</main>

<!-- ── Add Item Modal ── -->
<div id="item-modal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fa-solid fa-pen-to-square" style="margin-right:8px"></i>Thêm mục tiêu mới</h3>
        <input type="text" id="new-item-text" class="modal-input" placeholder="Nhập điều muốn làm... 🌟">
        <div class="modal-actions">
            <button class="btn-primary" onclick="confirmAddItem()"><i class="fa-solid fa-plus"></i> Thêm</button>
            <button class="btn-ghost"   onclick="closeModals()">Hủy</button>
        </div>
    </div>
</div>

<!-- ── Add Category Modal ── -->
<div id="category-modal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fa-solid fa-folder-plus" style="margin-right:8px"></i>Thêm danh mục mới</h3>
        <input type="text" id="new-cat-title" class="modal-input" placeholder="Tên danh mục (VD: Chill 🎬)">
        <div style="margin-bottom:.5rem;font-size:.75rem;opacity:.45;text-transform:uppercase;letter-spacing:.06em">Chọn icon</div>
        <div class="icon-picker" id="icon-picker">
            <div class="icon-opt selected" data-icon="fa-heart"          ><i class="fa-solid fa-heart"></i></div>
            <div class="icon-opt" data-icon="fa-plane-departure"         ><i class="fa-solid fa-plane-departure"></i></div>
            <div class="icon-opt" data-icon="fa-utensils"                ><i class="fa-solid fa-utensils"></i></div>
            <div class="icon-opt" data-icon="fa-bullseye"                ><i class="fa-solid fa-bullseye"></i></div>
            <div class="icon-opt" data-icon="fa-film"                    ><i class="fa-solid fa-film"></i></div>
            <div class="icon-opt" data-icon="fa-book"                    ><i class="fa-solid fa-book"></i></div>
            <div class="icon-opt" data-icon="fa-bag-shopping"            ><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="icon-opt" data-icon="fa-gamepad"                 ><i class="fa-solid fa-gamepad"></i></div>
            <div class="icon-opt" data-icon="fa-music"                   ><i class="fa-solid fa-music"></i></div>
            <div class="icon-opt" data-icon="fa-camera"                  ><i class="fa-solid fa-camera"></i></div>
            <div class="icon-opt" data-icon="fa-star"                    ><i class="fa-solid fa-star"></i></div>
            <div class="icon-opt" data-icon="fa-paw"                     ><i class="fa-solid fa-paw"></i></div>
        </div>
        <div class="modal-actions">
            <button class="btn-primary" onclick="confirmAddCategory()"><i class="fa-solid fa-plus"></i> Tạo</button>
            <button class="btn-ghost"   onclick="closeModals()">Hủy</button>
        </div>
    </div>
</div>


<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════ */
const BASE_URL = (typeof API_CONFIG !== 'undefined')
    ? API_CONFIG.BASE_URL
    : (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'http://localhost:8080' : '');

const API = `${BASE_URL}/api/bucket`;

let selectedIcon  = 'fa-heart';
let currentCatId  = null;
let bucketData    = [];   // source of truth từ server

/* ═══════════════════════════════════════════════════════════
   FETCH  ↔  SERVER
═══════════════════════════════════════════════════════════ */
async function fetchData() {
    try {
        const res = await fetch(API);
        if (!res.ok) throw new Error();
        bucketData = await res.json();
    } catch {
        // Fallback localStorage nếu server chưa chạy
        bucketData = JSON.parse(localStorage.getItem('loveBucketList')) || DEFAULT_DATA;
    }
    renderBucketList();
}

async function apiPost(url, body) {
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

async function apiPatch(url, body) {
    const res = await fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

async function apiDelete(url) {
    await fetch(url, { method: 'DELETE' });
}

/* ═══════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════ */
const DEFAULT_DATA = [
    { id: 1, title: 'Du Lịch', icon: 'fa-plane-departure', sortOrder: 0,
      items: [ { id:1, text:'Đi ngắm tuyết tại Sapa ❄️', done:false, doneDate:'', photo:'' },
               { id:2, text:'Check-in Đà Lạt 🌲',        done:false, doneDate:'', photo:'' } ] },
    { id: 2, title: 'Ẩm Thực', icon: 'fa-utensils', sortOrder: 1,
      items: [ { id:3, text:'Thử lẩu Haidilao 🍲',  done:false, doneDate:'', photo:'' },
               { id:4, text:'Tự nấu bữa tối 🍝',    done:false, doneDate:'', photo:'' } ] },
    { id: 3, title: 'Mục Tiêu', icon: 'fa-bullseye', sortOrder: 2,
      items: [ { id:5, text:'Cùng tốt nghiệp UET 🎓', done:false, doneDate:'', photo:'' },
               { id:6, text:'Nuôi một chú mèo 🐱',   done:false, doneDate:'', photo:'' } ] }
];

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function renderBucketList() {
    const grid = document.getElementById('bucket-grid');

    let html = bucketData.map(cat => {
        const total = cat.items.length;
        const done  = cat.items.filter(i => i.done).length;
        const pct   = total ? Math.round(done / total * 100) : 0;

        const itemsHtml = cat.items.map((item, idx) => {
            const photoTag = item.photo
                ? `<img class="item-photo-preview" src="${item.photo}" alt="">`
                : '';
            const uploadBtn = item.done
                ? `<label class="upload-photo-btn" title="Tải ảnh kỷ niệm">
                       <i class="fa-solid fa-image"></i>
                       <input type="file" accept="image/*" class="upload-photo-input"
                              onchange="uploadPhoto(event,${cat.id},${idx})">
                   </label>`
                : '';
            const doneDate = item.doneDate
                ? `<span class="item-done-date"><i class="fa-solid fa-check" style="margin-right:4px;color:#4ade80"></i>Hoàn thành ${item.doneDate}</span>`
                : '';

            return `
            <li class="bucket-item ${item.done ? 'done' : ''}" id="item-${cat.id}-${idx}">
                <div class="bucket-item-content" onclick="toggleItem(${cat.id},${idx})">
                    <div class="check-circle">
                        ${item.done ? '<i class="fa-solid fa-heart" style="color:white;font-size:.7rem"></i>' : ''}
                    </div>
                    <div class="item-body">
                        <span class="item-text">${item.text}</span>
                        ${doneDate}
                    </div>
                </div>
                ${photoTag}
                ${uploadBtn}
                <i class="fa-solid fa-xmark delete-item-btn" onclick="deleteItem(${cat.id},${idx})"></i>
            </li>`;
        }).join('');

        return `
        <div class="bucket-category">
            <div class="category-header">
                <div class="category-title">
                    <i class="fa-solid ${cat.icon || 'fa-heart'}"></i> ${cat.title}
                </div>
                <div class="edit-controls">
                    <button class="edit-btn" title="Xóa danh mục" onclick="deleteCategory(${cat.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
            <div class="cat-progress-wrap">
                <div class="cat-progress-info">
                    <span>Tiến độ</span>
                    <span>${done}/${total} · ${pct}%</span>
                </div>
                <div class="cat-progress-track">
                    <div class="cat-progress-fill" style="width:${pct}%"></div>
                </div>
            </div>
            <ul class="bucket-list">${itemsHtml}</ul>
            <button class="add-item-trigger" onclick="openItemModal(${cat.id})">
                <i class="fa-solid fa-plus"></i> Thêm mục tiêu
            </button>
        </div>`;
    }).join('');

    // "+ Add category" card
    html += `<div class="add-cat-card" onclick="openCategoryModal()">
                <i class="fa-solid fa-circle-plus"></i>
                <span>+ Thêm danh mục mới</span>
             </div>`;

    grid.innerHTML = html;
    updateOverallProgress();
    save();
}

function updateOverallProgress() {
    let total = 0, done = 0;
    bucketData.forEach(c => { total += c.items.length; done += c.items.filter(i => i.done).length; });
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('op-fill').style.width = pct + '%';
    document.getElementById('op-num').textContent  = `${done} / ${total} mục tiêu hoàn thành (${pct}%)`;
}

function save() {
    // Data giờ lưu trên server — chỉ giữ local cache để fallback offline
    localStorage.setItem('loveBucketList', JSON.stringify(bucketData));
}
</script>

<script>
/* ═══════════════════════════════════════════════════════════
   TOGGLE ITEM  (with confetti + date stamp)
═══════════════════════════════════════════════════════════ */
async function toggleItem(catId, idx) {
    const cat  = bucketData.find(c => c.id === catId);
    const item = cat.items[idx];
    item.done  = !item.done;

    if (item.done) {
        const now = new Date();
        item.doneDate = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
        launchConfetti();
    } else {
        item.doneDate = '';
    }

    // Optimistic UI update trước
    renderBucketList();

    // Sync lên server
    try {
        await apiPatch(`${API}/item/${item.id}`, { done: item.done, doneDate: item.doneDate || '' });
    } catch { /* giữ local nếu offline */ }
}

async function deleteItem(catId, idx) {
    const cat  = bucketData.find(c => c.id === catId);
    const item = cat.items[idx];
    cat.items.splice(idx, 1);
    renderBucketList();
    try { await apiDelete(`${API}/item/${item.id}`); } catch {}
}

/* ═══════════════════════════════════════════════════════════
   PHOTO UPLOAD
═══════════════════════════════════════════════════════════ */
function uploadPhoto(event, catId, idx) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
        const cat  = bucketData.find(c => c.id === catId);
        const item = cat.items[idx];
        item.photo = e.target.result;
        renderBucketList();
        try { await apiPatch(`${API}/item/${item.id}`, { photo: item.photo }); } catch {}
    };
    reader.readAsDataURL(file);
}

/* ═══════════════════════════════════════════════════════════
   CATEGORY ACTIONS
═══════════════════════════════════════════════════════════ */
function openItemModal(id) {
    currentCatId = id;
    document.getElementById('item-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('new-item-text').focus(), 80);
}

async function confirmAddItem() {
    const text = document.getElementById('new-item-text').value.trim();
    if (!text) return;
    try {
        const newItem = await apiPost(`${API}/category/${currentCatId}/item`,
            { text, done: false, doneDate: '', photo: '' });
        const cat = bucketData.find(c => c.id === currentCatId);
        cat.items.push(newItem);
    } catch {
        // Fallback offline
        const cat = bucketData.find(c => c.id === currentCatId);
        cat.items.push({ id: Date.now(), text, done: false, doneDate: '', photo: '' });
    }
    document.getElementById('new-item-text').value = '';
    closeModals();
    renderBucketList();
}

function openCategoryModal() {
    document.getElementById('category-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('new-cat-title').focus(), 80);
}

async function confirmAddCategory() {
    const title = document.getElementById('new-cat-title').value.trim();
    if (!title) return;
    try {
        const newCat = await apiPost(`${API}/category`,
            { title, icon: selectedIcon, sortOrder: bucketData.length, items: [] });
        bucketData.push(newCat);
    } catch {
        bucketData.push({ id: Date.now(), title, icon: selectedIcon, items: [] });
    }
    document.getElementById('new-cat-title').value = '';
    closeModals();
    renderBucketList();
}

async function deleteCategory(id) {
    if (confirm('Xóa danh mục này và toàn bộ mục tiêu bên trong?')) {
        bucketData = bucketData.filter(c => c.id !== id);
        renderBucketList();
        try { await apiDelete(`${API}/category/${id}`); } catch {}
    }
}

function resetBucketList() {
    if (confirm('Cài lại toàn bộ danh sách về mặc định?\n(Dữ liệu hiện tại sẽ bị xóa khỏi server)')) {
        fetch(`${API}/seed`, { method: 'POST' })
            .then(r => r.json())
            .then(data => { bucketData = data; renderBucketList(); })
            .catch(() => location.reload());
    }
}

function closeModals() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
}

// Icon picker
document.getElementById('icon-picker').addEventListener('click', e => {
    const opt = e.target.closest('.icon-opt');
    if (!opt) return;
    document.querySelectorAll('.icon-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedIcon = opt.dataset.icon;
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
});

// Enter key support
document.getElementById('new-item-text').addEventListener('keypress', e => { if (e.key === 'Enter') confirmAddItem(); });
document.getElementById('new-cat-title').addEventListener('keypress', e => { if (e.key === 'Enter') confirmAddCategory(); });
</script>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFETTI ENGINE  (canvas-based, hearts + circles)
═══════════════════════════════════════════════════════════ */
(function () {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    let animId    = null;

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const COLORS = ['#ff4d4d','#f43f5e','#fb7185','#fda4af','#fff','#fbbf24','#a78bfa','#34d399'];

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function createParticle(x, y) {
        const type = Math.random() < .4 ? 'heart' : (Math.random() < .5 ? 'circle' : 'rect');
        return {
            x, y,
            vx:   rand(-4, 4),
            vy:   rand(-12, -4),
            alpha: 1,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            size:  rand(6, 16),
            rot:   rand(0, Math.PI * 2),
            rotV:  rand(-.15, .15),
            type,
            gravity: rand(.25, .55),
            drag:    rand(.97, .995)
        };
    }

    function drawHeart(x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(x,       y - size*.3,  x + size*.5, y - size*.6, x + size*.5, y - size*.3);
        ctx.bezierCurveTo(x + size*.5, y,        x,           y + size*.4, x,           y + size*.4);
        ctx.bezierCurveTo(x,       y + size*.4,  x - size*.5, y,           x - size*.5, y - size*.3);
        ctx.bezierCurveTo(x - size*.5, y - size*.6, x,        y - size*.3, x,           y);
        ctx.closePath();
        ctx.fill();
    }

    function step() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.alpha > .02);

        particles.forEach(p => {
            p.x    += p.vx;
            p.vy   += p.gravity;
            p.vx   *= p.drag;
            p.vy   *= p.drag;
            p.y    += p.vy;
            p.rot  += p.rotV;
            p.alpha = Math.max(0, p.alpha - .012);

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle   = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);

            if (p.type === 'heart') {
                drawHeart(0, 0, p.size);
            } else if (p.type === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * .5);
            }
            ctx.restore();
        });

        if (particles.length > 0) {
            animId = requestAnimationFrame(step);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animId = null;
        }
    }

    window.launchConfetti = function () {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        for (let i = 0; i < 120; i++) {
            particles.push(createParticle(
                cx + rand(-80, 80),
                cy + rand(-40, 40)
            ));
        }
        if (!animId) animId = requestAnimationFrame(step);
    };
})();

/* ═══════════════════════════════════════════════════════════
   DARK MODE / MUSIC
═══════════════════════════════════════════════════════════ */
function toggleDarkMode() {
    document.body.classList.toggle('light-mode');
    const icon = document.getElementById('dark-mode-icon');
    icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}

const audio = document.getElementById('bg-music');
function toggleMusic() {
    if (audio.paused) {
        audio.play();
        document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn';
    } else {
        audio.pause();
        document.getElementById('play-pause').className = 'fa-solid fa-play music-btn';
    }
}

/* ── INIT ── */
window.onload = async () => {
    await fetchData();
    // Nếu DB trống, seed dữ liệu mặc định
    if (bucketData.length === 0) {
        try {
            const res = await fetch(`${API}/seed`, { method: 'POST' });
            bucketData = await res.json();
            renderBucketList();
        } catch {}
    }
};
</script>

    <script src="../assets/js/common.js"></script>
