<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Cổng Học Sinh</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg-color);
        }
        .register-card {
            width: 100%;
            max-width: 500px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.1);
        }
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--primary-color));
            color: white;
            transition: 0.3s;
        }
        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(217, 70, 239, 0.3);
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-weight: 800; font-size: 1.8rem; margin-bottom: 5px;">Tạo Tài Khoản</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Trở thành một phần của cộng đồng MtruongHóa</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" class="form-control" id="fullName" placeholder="VD: Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" class="form-control" id="username" placeholder="Nhập tên tài khoản" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth" id="register-btn">ĐĂNG KÝ NGAY</button>
        </form>

        <p style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
            Đã có tài khoản? <a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Đăng nhập</a>
        </p>
    </div>

    <script>
        // Lấy username từ URL nếu được chuyển hướng từ trang login
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('username')) {
            document.getElementById('username').value = urlParams.get('username');
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPw = document.getElementById('confirm-password').value;

            if (password !== confirmPw) return alert("Mật khẩu xác nhận không khớp!");

            btn.innerText = "ĐANG TẠO...";
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8080/api/students/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, username, password })
                });

                if (response.ok) {
                    alert("Đăng ký thành công! Hãy đăng nhập.");
                    window.location.href = 'login.html';
                } else {
                    const error = await response.text();
                    alert(error || "Lỗi đăng ký!");
                }
            } catch (err) {
                alert("Không thể kết nối server!");
            } finally {
                btn.innerText = "ĐĂNG KÝ NGAY";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
