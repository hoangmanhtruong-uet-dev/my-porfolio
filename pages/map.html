<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Tình Yêu ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        /* ── MAP CONTAINER ── */
        #love-map {
            height: 580px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(255,77,77,0.2);
            border: 2px solid rgba(255,77,77,0.3);
            position: relative;
            z-index: 1;
        }
        .map-section { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .map-header  { text-align: center; margin-bottom: 2rem; }
        .map-header h2 { font-family: 'Pacifico', cursive; font-size: 3rem; color: #ff4d4d; margin-bottom: .6rem; }
        .map-header p  { font-size: 1.05rem; opacity: .8; }

        /* ── CUSTOM HEART ICON ── */
        .heart-marker-icon {
            background: none;
            border: none;
        }
        .heart-pin {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            animation: pinBounce 2s ease-in-out infinite;
        }
        .heart-pin-inner {
            width: 38px; height: 38px;
            background: linear-gradient(135deg,#ff4d4d,#f43f5e);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(255,77,77,.5);
            transition: transform .3s;
        }
        .heart-pin-inner i {
            transform: rotate(45deg);
            color: white;
            font-size: 1rem;
        }
        .heart-pin-label {
            margin-top: 6px;
            background: rgba(15,23,42,.85);
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 700;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,77,77,.3);
        }
        @keyframes pinBounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }

        /* ── POPUP ── */
        .leaflet-popup-content-wrapper {
            background: rgba(11,1,24,.92);
            color: #fff;
            border-radius: 18px;
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,77,77,.35);
            min-width: 220px;
        }
        .leaflet-popup-tip { background: rgba(11,1,24,.92); }
        .popup-photo {
            width: 100%; height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1.5px solid rgba(255,77,77,.3);
        }
        .popup-name { color:#ff4d4d; font-size:1.1rem; font-weight:800; margin: 0 0 4px; }
        .popup-desc { font-size:.88rem; opacity:.8; margin: 0 0 6px; line-height:1.4; }
        .popup-date { font-size:.75rem; color:#f9a8d4; opacity:.7; }
        .popup-category {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .cat-food    { background:rgba(251,146,60,.15); color:#fb923c; }
        .cat-date    { background:rgba(255,77,77,.15);  color:#ff4d4d; }
        .cat-travel  { background:rgba(59,130,246,.15); color:#60a5fa; }

        /* ── LOVE PATH (dashed animated polyline) ── */
        .love-path-line { stroke-dasharray: 12,8; animation: dashFlow 1.5s linear infinite; }
        @keyframes dashFlow { to { stroke-dashoffset: -20; } }

        /* ── STATS WIDGET ── */
        .map-stats-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .map-stat-chip {
            background: rgba(255,77,77,.08);
            border: 1px solid rgba(255,77,77,.2);
            border-radius: 40px;
            padding: .55rem 1.2rem;
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .9rem;
            font-weight: 600;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        .map-stat-chip i { color:#ff4d4d; }

        /* ── DAYS COUNTER WIDGET ── */
        .days-widget {
            display: flex;
            align-items: center;
            gap: .8rem;
            background: rgba(255,77,77,.07);
            border: 1px solid rgba(255,77,77,.2);
            border-radius: 40px;
            padding: .55rem 1.4rem;
            font-size: .9rem;
            font-weight: 700;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        .days-widget i { color:#ff4d4d; animation: heartPulse 1.5s ease-in-out infinite; }
        @keyframes heartPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

        /* ── SEARCH BAR ── */
        .search-wrap {
            position: relative;
            max-width: 620px;
            margin: 0 auto 1.5rem;
        }
        .search-inner {
            display: flex;
            gap: 10px;
        }
        .search-inner input {
            flex: 1;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,77,77,.3);
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: .95rem;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .search-inner input::placeholder { color:rgba(255,255,255,.4); }
        .search-inner button {
            background: #ff4d4d;
            color: #fff;
            border: none;
            padding: 0 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: .3s;
        }
        .search-inner button:hover { background:#f43f5e; transform:translateY(-1px); }
        .suggestions-box {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: rgba(11,1,24,.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,77,77,.2);
            border-radius: 18px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 20000;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,.5);
        }
        .suggestion-item {
            padding: 11px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,.05);
            font-size: .88rem;
            transition: .2s;
        }
        .suggestion-item:hover { background:rgba(255,77,77,.12); color:#ff4d4d; }
        .suggestion-item:last-child { border-bottom:none; }

        /* ── FILTER TABS ── */
        .filter-tabs {
            display: flex;
            gap: .6rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .filter-tab {
            padding: 7px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.04);
            color: rgba(255,255,255,.7);
            cursor: pointer;
            font-size: .85rem;
            font-weight: 600;
            transition: .25s;
        }
        .filter-tab:hover, .filter-tab.active {
            background: rgba(255,77,77,.18);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        /* ── ADD FORM MODAL ── */
        .add-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.7);
            backdrop-filter: blur(12px);
            z-index: 15000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .add-modal-overlay.open { display: flex; }
        .add-modal-card {
            background: linear-gradient(145deg,#1a0b2e,#1e1040);
            border: 1px solid rgba(255,77,77,.3);
            border-radius: 28px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,.6);
        }
        .add-modal-card h3 { color:#ff4d4d; font-size:1.4rem; margin-bottom:1.2rem; }
        .am-field { margin-bottom: .9rem; }
        .am-label {
            display:block; font-size:.75rem; font-weight:700;
            text-transform:uppercase; letter-spacing:.06em;
            color:rgba(255,255,255,.45); margin-bottom:5px;
        }
        .am-input {
            width: 100%;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            padding: 10px 14px;
            color: #fff;
            font-size: .9rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color .2s;
        }
        .am-input:focus { border-color:rgba(255,77,77,.6); background:rgba(255,77,77,.06); }
        .am-input::placeholder { color:rgba(255,255,255,.25); }
        .am-input option { background:#1a0b2e; }
        .am-coords { font-size:.78rem; opacity:.5; margin-bottom:.8rem; }
        .am-actions { display:flex; gap:.8rem; margin-top:1.2rem; }
        .am-btn-save {
            flex:1; padding:12px; border:none; border-radius:14px;
            background:linear-gradient(135deg,#ff4d4d,#f43f5e);
            color:#fff; font-weight:700; font-size:.95rem; cursor:pointer;
            box-shadow:0 6px 20px rgba(255,77,77,.35); transition:.25s;
        }
        .am-btn-save:hover { transform:translateY(-2px); filter:brightness(1.1); }
        .am-btn-cancel {
            flex:1; padding:12px; border:1px solid rgba(255,255,255,.15);
            border-radius:14px; background:transparent; color:rgba(255,255,255,.6);
            font-weight:600; cursor:pointer; transition:.25s;
        }
        .am-btn-cancel:hover { border-color:rgba(255,255,255,.4); color:#fff; }

        /* ── LOCATION CARDS ── */
        .location-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.1rem;
            margin-top: 1.5rem;
        }
        .loc-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: all .3s cubic-bezier(.4,0,.2,1);
        }
        .loc-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,77,77,.4);
            box-shadow: 0 15px 35px rgba(255,77,77,.15);
        }
        .loc-card-img {
            width:100%; height: 120px;
            object-fit: cover;
            display: block;
        }
        .loc-card-img-placeholder {
            width:100%; height: 120px;
            background: linear-gradient(135deg,rgba(255,77,77,.15),rgba(244,63,94,.08));
            display: flex; align-items:center; justify-content:center;
            font-size: 2.5rem; color: rgba(255,77,77,.5);
        }
        .loc-card-body { padding: .9rem 1rem; }
        .loc-card-name { font-weight:800; color:#fff; margin-bottom:3px; font-size:.98rem; }
        .loc-card-desc { font-size:.8rem; color:rgba(255,255,255,.55); margin-bottom:.5rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .loc-card-footer { display:flex; justify-content:space-between; align-items:center; }
        .loc-card-date  { font-size:.72rem; color:#f9a8d4; opacity:.7; }
        .loc-card-del   { color:rgba(255,77,77,.5); cursor:pointer; font-size:.8rem; transition:.2s; }
        .loc-card-del:hover { color:#ff4d4d; }
        .add-loc-card {
            background: rgba(255,77,77,.04);
            border: 2px dashed rgba(255,77,77,.25);
            border-radius: 18px;
            min-height: 160px;
            display: flex; flex-direction:column; align-items:center; justify-content:center;
            cursor: pointer; transition: .3s; gap: .6rem; color: rgba(255,77,77,.5);
        }
        .add-loc-card:hover {
            border-color:#ff4d4d; background:rgba(255,77,77,.08);
            color:#ff4d4d; transform:translateY(-3px);
        }
        .add-loc-card i { font-size:2rem; }
        .add-loc-card span { font-size:.9rem; font-weight:700; }
    </style>
</head>

<body class="love-page-body">
    <!-- ── WIDGETS ── -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
    </div>
    <div class="music-player">
        <i class="fa-solid fa-play music-btn" id="play-pause" onclick="toggleMusic()"></i>
        <span id="song-title">Perfect - Ed Sheeran ❤️</span>
        <span id="days-music-widget" style="font-size:.75rem;opacity:.6;"></span>
        <audio id="bg-music" loop>
            <source src="https://github.com/hoangtran0410/Pretty-In-Love/blob/master/music/perfect.mp3?raw=true" type="audio/mpeg">
        </audio>
    </div>
    <div class="back-nav">
        <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
    </div>

    <!-- ── ADD LOCATION MODAL ── -->
    <div id="add-modal" class="add-modal-overlay">
        <div class="add-modal-card">
            <h3><i class="fa-solid fa-map-pin" style="margin-right:8px;"></i>Thêm địa điểm kỷ niệm</h3>
            <p class="am-coords" id="am-coords-display">📍 Click vào bản đồ để chọn tọa độ...</p>

            <div class="am-field">
                <label class="am-label">Tên địa điểm</label>
                <input type="text" id="am-name" class="am-input" placeholder="VD: Hồ Hoàn Kiếm">
            </div>
            <div class="am-field">
                <label class="am-label">Cảm nghĩ / Caption</label>
                <textarea id="am-desc" class="am-input" rows="2" placeholder="Kỷ niệm tại đây..."></textarea>
            </div>
            <div class="am-field">
                <label class="am-label">Danh mục</label>
                <select id="am-category" class="am-input">
                    <option value="date">💑 Hẹn hò dạo phố</option>
                    <option value="food">🍰 Ăn uống</option>
                    <option value="travel">✈️ Du lịch</option>
                </select>
            </div>
            <div class="am-field">
                <label class="am-label">Ngày đến thăm</label>
                <input type="date" id="am-date" class="am-input">
            </div>
            <div class="am-field">
                <label class="am-label">Ảnh kỷ niệm (URL)</label>
                <input type="text" id="am-photo" class="am-input" placeholder="https://... hoặc để trống">
            </div>

            <div class="am-actions">
                <button class="am-btn-save" onclick="submitAddMarker()">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu địa điểm
                </button>
                <button class="am-btn-cancel" onclick="closeAddModal()">Hủy</button>
            </div>
        </div>
    </div>

    <main class="page-content">
        <section class="map-section">
            <div class="map-header">
                <h2>🗺️ Bản Đồ Tình Yêu</h2>
                <p>Dấu chân hạnh phúc của chúng mình trên từng con đường ❤️</p>
            </div>

            <!-- Stats bar -->
            <div class="map-stats-bar" id="map-stats-bar">
                <div class="map-stat-chip"><i class="fa-solid fa-location-dot"></i><span id="stat-count">0 địa điểm</span></div>
                <div class="map-stat-chip"><i class="fa-solid fa-route"></i><span id="stat-distance">0 km hành trình</span></div>
                <div class="map-stat-chip"><i class="fa-solid fa-star"></i><span id="stat-farthest">Chưa có dữ liệu</span></div>
                <div class="days-widget"><i class="fa-solid fa-heart"></i><span id="stat-days">...</span></div>
            </div>

            <!-- Search -->
            <div class="search-wrap">
                <div class="search-inner">
                    <input type="text" id="address-input" placeholder="Tìm kiếm địa chỉ tại Hà Nội..." oninput="handleSearchInput(this.value)" autocomplete="off">
                    <button onclick="searchAddress()"><i class="fa-solid fa-magnifying-glass"></i> Tìm</button>
                </div>
                <div id="search-suggestions" class="suggestions-box"></div>
            </div>

            <!-- Filter tabs -->
            <div class="filter-tabs">
                <div class="filter-tab active" data-cat="all" onclick="filterLocations('all',this)">
                    🗺️ Tất cả
                </div>
                <div class="filter-tab" data-cat="food" onclick="filterLocations('food',this)">
                    🍰 Ăn uống
                </div>
                <div class="filter-tab" data-cat="date" onclick="filterLocations('date',this)">
                    👣 Hẹn hò dạo phố
                </div>
                <div class="filter-tab" data-cat="travel" onclick="filterLocations('travel',this)">
                    ✈️ Du lịch xa
                </div>
            </div>

            <!-- Map -->
            <div id="love-map"></div>

            <!-- Location cards grid -->
            <div style="margin-top:2.5rem;">
                <h3 style="color:#ff4d4d; margin-bottom:1.2rem;">
                    <i class="fa-solid fa-map-location-dot" style="margin-right:8px;"></i>Địa điểm kỷ niệm
                </h3>
                <div class="location-cards-grid" id="location-cards-grid"></div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/config.js"></script>
    <script>
    /* ─────────────────────────────────────────────
       DARK MODE / MUSIC
    ───────────────────────────────────────────── */
    function toggleDarkMode() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('dark-mode-icon');
        icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }
    const audio = document.getElementById('bg-music');
    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn'; }
        else              { audio.pause(); document.getElementById('play-pause').className = 'fa-solid fa-play music-btn'; }
    }

    /* ─────────────────────────────────────────────
       DAYS COUNTER
    ───────────────────────────────────────────── */
    function calcDays() {
        const cfg = JSON.parse(localStorage.getItem('inLoveConfig')) || {};
        const start = new Date(cfg.startDate || '2025-02-10');
        const now   = new Date();
        const days  = Math.floor((now - start) / 86400000);
        const el    = document.getElementById('stat-days');
        const mus   = document.getElementById('days-music-widget');
        if (el)  el.textContent  = `Đã bên nhau ${days} ngày`;
        if (mus) mus.textContent = `• ${days} ngày ❤️`;
    }

    /* ─────────────────────────────────────────────
       MAP INIT
    ───────────────────────────────────────────── */
    const MAP_API = (typeof API_CONFIG !== 'undefined' ? API_CONFIG.BASE_URL : 'http://localhost:8080') + '/api/locations';

    const map = L.map('love-map', { zoomControl: true }).setView([21.0285, 105.8542], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Category icon config
    const CAT = {
        food:   { icon: 'fa-utensils',     color: '#fb923c' },
        travel: { icon: 'fa-plane',         color: '#60a5fa' },
        date:   { icon: 'fa-heart',         color: '#ff4d4d' },
        default:{ icon: 'fa-location-dot',  color: '#ff4d4d' }
    };

    function makeIcon(loc) {
        const cat = CAT[loc.category] || CAT.default;
        return L.divIcon({
            html: `<div class="heart-pin">
                     <div class="heart-pin-inner" style="background:linear-gradient(135deg,${cat.color},${cat.color}cc)">
                       <i class="fa-solid ${cat.icon}"></i>
                     </div>
                     <span class="heart-pin-label">${loc.name}</span>
                   </div>`,
            className: 'heart-marker-icon',
            iconSize: [40, 56],
            iconAnchor: [20, 56],
            popupAnchor: [0, -58]
        });
    }

    let allLocations = [];
    let currentFilter = 'all';
    let lovePath = null;
    let mapMarkers = [];
    let selectedLatLng = null;
    let tempMarker = null;

    /* ─────────────────────────────────────────────
       LOAD & RENDER MARKERS
    ───────────────────────────────────────────── */
    async function loadMarkers() {
        try {
            const res = await fetch(MAP_API);
            allLocations = await res.json();
        } catch (e) {
            console.warn('Backend offline – dùng dữ liệu mẫu');
            allLocations = [
                { id:1, lat:21.0285, lon:105.8522, name:'Hồ Hoàn Kiếm', description:'Lần đầu nắm tay đi dạo ❤️', category:'date',   visitDate:'2025-02-14', photoUrl:'', sortOrder:1 },
                { id:2, lat:21.045,  lon:105.838,  name:'Hồ Tây',        description:'Hoàng hôn lãng mạn nhất.',  category:'date',   visitDate:'2025-03-01', photoUrl:'', sortOrder:2 },
                { id:3, lat:21.032,  lon:105.848,  name:'Bún chả Obama', description:'Bữa ăn ngon nhất đời 🍜',  category:'food',   visitDate:'2025-04-10', photoUrl:'', sortOrder:3 },
                { id:4, lat:20.8539, lon:106.6881, name:'Ninh Bình',      description:'Chuyến đi xa đầu tiên ✈️', category:'travel', visitDate:'2025-05-20', photoUrl:'', sortOrder:4 }
            ];
        }
        renderAll();
    }

    function renderAll() {
        renderMapMarkers();
        renderLovePath();
        renderCards();
        updateStats();
    }

    function renderMapMarkers() {
        // Clear existing markers
        mapMarkers.forEach(m => map.removeLayer(m));
        mapMarkers = [];

        const filtered = currentFilter === 'all'
            ? allLocations
            : allLocations.filter(l => l.category === currentFilter);

        filtered.forEach(loc => {
            const cat  = CAT[loc.category] || CAT.default;
            const dateStr = loc.visitDate ? `<span class="popup-date"><i class="fa-solid fa-calendar-heart" style="margin-right:4px;"></i>${formatDate(loc.visitDate)}</span>` : '';
            const photoHtml = loc.photoUrl
                ? `<img src="${loc.photoUrl}" class="popup-photo" alt="${loc.name}">`
                : '';
            const m = L.marker([loc.lat, loc.lon], { icon: makeIcon(loc) })
                .addTo(map)
                .bindPopup(`
                    <div>
                        ${photoHtml}
                        <span class="popup-category cat-${loc.category || 'date'}">${getCatLabel(loc.category)}</span>
                        <p class="popup-name">${loc.name}</p>
                        <p class="popup-desc">${loc.description || ''}</p>
                        ${dateStr}
                    </div>
                `, { maxWidth: 260 });
            mapMarkers.push(m);
        });
    }

    function renderLovePath() {
        if (lovePath) map.removeLayer(lovePath);

        // Sort by sortOrder then by visitDate
        const sorted = [...allLocations].sort((a, b) => {
            if (a.sortOrder !== b.sortOrder) return (a.sortOrder || 0) - (b.sortOrder || 0);
            return (a.visitDate || '').localeCompare(b.visitDate || '');
        });

        if (sorted.length < 2) return;

        const coords = sorted.map(l => [l.lat, l.lon]);

        lovePath = L.polyline(coords, {
            color: '#ff4d4d',
            weight: 3,
            opacity: 0.75,
            dashArray: '10, 7',
            className: 'love-path-line'
        }).addTo(map);
    }

    function renderCards() {
        const grid = document.getElementById('location-cards-grid');
        const filtered = currentFilter === 'all'
            ? allLocations
            : allLocations.filter(l => l.category === currentFilter);

        let html = '';

        filtered.forEach(loc => {
            const imgBlock = loc.photoUrl
                ? `<img src="${loc.photoUrl}" class="loc-card-img" alt="${loc.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const placeholderStyle = loc.photoUrl ? 'style="display:none"' : '';
            html += `
            <div class="loc-card" onclick="flyToMarker(${loc.lat},${loc.lon},${loc.id})">
                ${imgBlock}
                <div class="loc-card-img-placeholder" ${placeholderStyle}>
                    <i class="fa-solid ${(CAT[loc.category]||CAT.default).icon}" style="color:${(CAT[loc.category]||CAT.default).color}"></i>
                </div>
                <div class="loc-card-body">
                    <div class="loc-card-name">${loc.name}</div>
                    <div class="loc-card-desc">${loc.description || ''}</div>
                    <div class="loc-card-footer">
                        <span class="loc-card-date">${loc.visitDate ? formatDate(loc.visitDate) : ''}</span>
                        <i class="fa-solid fa-trash loc-card-del" onclick="event.stopPropagation();deleteMarker(${loc.id})"></i>
                    </div>
                </div>
            </div>`;
        });

        // "+ Add" card
        html += `<div class="add-loc-card" onclick="openAddModal(null)">
                    <i class="fa-solid fa-circle-plus"></i>
                    <span>+ Thêm kỷ niệm mới</span>
                 </div>`;

        grid.innerHTML = html;
    }

    function flyToMarker(lat, lon, id) {
        map.flyTo([lat, lon], 16, { duration: 1.2 });
        setTimeout(() => {
            const m = mapMarkers.find(mk => {
                const ll = mk.getLatLng();
                return Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lon) < 0.0001;
            });
            if (m) m.openPopup();
        }, 1300);
    }

    /* ─────────────────────────────────────────────
       STATS
    ───────────────────────────────────────────── */
    function updateStats() {
        const count = allLocations.length;
        document.getElementById('stat-count').textContent = `${count} địa điểm`;

        // Total distance (haversine sum along sorted path)
        const sorted = [...allLocations].sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
        let dist = 0;
        for (let i = 1; i < sorted.length; i++) {
            dist += haversine(sorted[i-1].lat, sorted[i-1].lon, sorted[i].lat, sorted[i].lon);
        }
        document.getElementById('stat-distance').textContent = `Hành trình: ${dist.toFixed(1)} km`;

        // Farthest from Hoan Kiem
        let farthest = null, maxD = 0;
        allLocations.forEach(l => {
            const d = haversine(21.0285, 105.8522, l.lat, l.lon);
            if (d > maxD) { maxD = d; farthest = l; }
        });
        document.getElementById('stat-farthest').textContent = farthest
            ? `Xa nhất: ${farthest.name} (${maxD.toFixed(1)}km)`
            : 'Chưa có dữ liệu';
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = rad(lat2-lat1), dLon = rad(lon2-lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function rad(d) { return d * Math.PI / 180; }

    /* ─────────────────────────────────────────────
       FILTER
    ───────────────────────────────────────────── */
    function filterLocations(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderAll();
    }

    /* ─────────────────────────────────────────────
       ADD MARKER MODAL
    ───────────────────────────────────────────── */
    function openAddModal(latlng) {
        selectedLatLng = latlng;
        document.getElementById('add-modal').classList.add('open');
        if (latlng) {
            document.getElementById('am-coords-display').textContent =
                `📍 ${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
        } else {
            document.getElementById('am-coords-display').textContent =
                '📍 Click vào bản đồ để chọn tọa độ, hoặc tìm kiếm địa chỉ';
        }
        document.getElementById('am-date').valueAsDate = new Date();
    }

    function closeAddModal() {
        document.getElementById('add-modal').classList.remove('open');
        if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
        clearAddForm();
    }

    function clearAddForm() {
        ['am-name','am-desc','am-photo'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
    }

    async function submitAddMarker() {
        const name = document.getElementById('am-name').value.trim();
        const desc = document.getElementById('am-desc').value.trim();
        if (!name) { alert('Vui lòng nhập tên địa điểm!'); return; }
        if (!selectedLatLng) { alert('Hãy click vào bản đồ hoặc tìm kiếm địa chỉ để chọn tọa độ!'); return; }

        const newLoc = {
            name,
            description: desc,
            lat:  selectedLatLng.lat,
            lon:  selectedLatLng.lng || selectedLatLng.lon,
            category:  document.getElementById('am-category').value,
            visitDate: document.getElementById('am-date').value,
            photoUrl:  document.getElementById('am-photo').value.trim(),
            sortOrder: allLocations.length + 1
        };

        try {
            const res = await fetch(MAP_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newLoc)
            });
            if (res.ok) {
                closeAddModal();
                await loadMarkers();
            } else {
                alert('Lỗi lưu địa điểm. Kiểm tra backend!');
            }
        } catch (e) {
            // Offline fallback: add locally
            newLoc.id = Date.now();
            allLocations.push(newLoc);
            closeAddModal();
            renderAll();
        }
    }

    async function deleteMarker(id) {
        if (!confirm('Xóa địa điểm này?')) return;
        try {
            await fetch(`${MAP_API}/${id}`, { method: 'DELETE' });
            await loadMarkers();
        } catch (e) {
            allLocations = allLocations.filter(l => l.id !== id);
            renderAll();
        }
    }

    // Click on map to select position
    map.on('click', function(e) {
        selectedLatLng = e.latlng;
        if (tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.circleMarker(e.latlng, { radius:8, color:'#ff4d4d', fillColor:'#ff4d4d', fillOpacity:.5 }).addTo(map);
        openAddModal(e.latlng);
    });

    /* ─────────────────────────────────────────────
       SEARCH / GEOCODING
    ───────────────────────────────────────────── */
    let searchTimeout;
    function handleSearchInput(q) {
        clearTimeout(searchTimeout);
        const box = document.getElementById('search-suggestions');
        if (q.length < 3) { box.style.display = 'none'; return; }
        searchTimeout = setTimeout(async () => {
            try {
                let sq = q;
                if (!sq.toLowerCase().includes('hà nội') && !sq.toLowerCase().includes('hanoi')) sq += ', Hà Nội';
                const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sq)}&countrycodes=vn&limit=5`);
                const data = await res.json();
                if (data.length) {
                    box.innerHTML = data.map(item =>
                        `<div class="suggestion-item" onclick="selectSuggestion('${item.display_name.replace(/'/g,"\\'")}',${item.lat},${item.lon})">
                           <i class="fa-solid fa-location-dot" style="color:#ff4d4d;margin-right:8px;"></i>${item.display_name}
                         </div>`
                    ).join('');
                    box.style.display = 'block';
                } else { box.style.display = 'none'; }
            } catch { box.style.display = 'none'; }
        }, 300);
    }

    function selectSuggestion(name, lat, lon) {
        document.getElementById('address-input').value = name;
        document.getElementById('search-suggestions').style.display = 'none';
        const latlng = { lat: parseFloat(lat), lng: parseFloat(lon) };
        map.flyTo([latlng.lat, latlng.lng], 16, { duration: 1 });
        selectedLatLng = latlng;
        if (tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.circleMarker([latlng.lat, latlng.lng], { radius:8, color:'#ff4d4d', fillColor:'#ff4d4d', fillOpacity:.5 }).addTo(map);
        document.getElementById('am-name').value = name.split(',')[0];
        openAddModal(latlng);
    }

    async function searchAddress() {
        const q = document.getElementById('address-input').value.trim();
        if (!q) return;
        const btn = document.querySelector('.search-inner button');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        try {
            let sq = q;
            if (!sq.toLowerCase().includes('hà nội') && !sq.toLowerCase().includes('hanoi')) sq += ', Hà Nội';
            const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sq)}&countrycodes=vn&limit=1`);
            const data = await res.json();
            if (data.length) {
                const r = data[0];
                selectSuggestion(r.display_name, r.lat, r.lon);
            } else { alert('Không tìm thấy địa chỉ. Thử nhập chi tiết hơn!'); }
        } catch { alert('Lỗi tìm kiếm. Thử lại sau!'); }
        finally { btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Tìm'; }
    }

    document.getElementById('address-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchAddress();
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.search-wrap')) {
            document.getElementById('search-suggestions').style.display = 'none';
        }
    });

    /* ─────────────────────────────────────────────
       HELPERS
    ───────────────────────────────────────────── */
    function getCatLabel(cat) {
        const labels = { food:'🍰 Ăn uống', date:'👣 Hẹn hò', travel:'✈️ Du lịch' };
        return labels[cat] || '📍 Địa điểm';
    }

    function formatDate(d) {
        if (!d) return '';
        const [y,m,day] = d.split('-');
        return `${day}/${m}/${y}`;
    }

    /* ─────────────────────────────────────────────
       INIT
    ───────────────────────────────────────────── */
    calcDays();
    loadMarkers();

    setTimeout(() => { map.invalidateSize(); }, 400);
    window.addEventListener('resize', () => { map.invalidateSize(); });
    </script>
</body>
