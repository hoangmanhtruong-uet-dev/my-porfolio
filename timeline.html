<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dòng Thời Gian Kỷ Niệm ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        .timeline-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem;
            position: relative;
        }
        .timeline-header {
            text-align: center;
            margin-bottom: 5rem;
        }
        .timeline-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            background: linear-gradient(to right, #ff4d4d, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        /* Modern Toolbar */
        .timeline-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 40px;
            border-radius: 100px;
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .control-group { display: flex; align-items: center; gap: 15px; }
        .control-group label { font-size: 0.9rem; font-weight: 600; color: #ff4d4d; }
        .zoom-slider { width: 120px; accent-color: #ff4d4d; height: 4px; }
        .search-timeline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .search-timeline:focus {
            border-color: #ff4d4d;
            background: rgba(255,255,255,0.1);
            outline: none;
        }

        /* Timeline Progress Line */
        .timeline-main {
            position: relative;
            padding: 2rem 0;
        }
        .timeline-line-bg {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            top: 0;
        }
        .timeline-line-progress {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            background: linear-gradient(to bottom, #ff4d4d, #f43f5e);
            border-radius: 10px;
            top: 0;
            transition: height 0.3s ease;
        }

        /* Timeline Items */
        .timeline-item {
            display: flex;
            justify-content: flex-end;
            padding-right: 50%;
            position: relative;
            margin-bottom: 80px;
            width: 100%;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .timeline-item.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .timeline-item:nth-child(even) {
            justify-content: flex-start;
            padding-right: 0;
            padding-left: 50%;
            transform: translateX(50px);
        }
        .timeline-item:nth-child(even).visible {
            transform: translateX(0);
        }

        .timeline-dot {
            width: 24px;
            height: 24px;
            background: #ff4d4d;
            border: 4px solid #1e293b;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 30px;
            transform: translateX(-50%) scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }
        .timeline-item.visible .timeline-dot { transform: translateX(-50%) scale(1); }

        .timeline-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0;
            border-radius: 30px;
            width: 90%;
            margin: 0 auto;
            position: relative;
            transition: all 0.4s ease;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .timeline-card:hover {
            transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
            border-color: rgba(255, 77, 77, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(255, 77, 77, 0.15);
        }

        .m-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        .m-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .timeline-card:hover .m-thumbnail { transform: scale(1.1); }

        .m-content-preview { padding: 1.8rem; }
        .m-date { font-weight: 800; color: #ff4d4d; font-size: 0.9rem; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 2px; }
        .m-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; color: #fff; }
        .m-desc { font-size: 0.95rem; opacity: 0.5; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .delete-milestone {
            position: absolute; top: 15px; right: 15px; width: 35px; height: 35px;
            background: rgba(0,0,0,0.4); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: 0.3s; z-index: 10; backdrop-filter: blur(10px);
        }
        .timeline-card:hover .delete-milestone { opacity: 1; }
        .delete-milestone:hover { background: #ff4d4d; }

        .edit-milestone {
            position: absolute; top: 15px; right: 60px; width: 35px; height: 35px;
            background: rgba(0,0,0,0.4); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: 0.3s; z-index: 10; backdrop-filter: blur(10px);
        }
        .timeline-card:hover .edit-milestone { opacity: 1; }
        .edit-milestone:hover { background: #ffcc00; color: #000; }

        /* Detail Modal */
        .detail-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(40px);
            display: none; justify-content: center; align-items: center; z-index: 5000; padding: 20px;
        }
        .detail-content {
            background: #0f172a; max-width: 800px; width: 100%; border-radius: 40px;
            overflow: hidden; border: 1px solid rgba(255, 77, 77, 0.2);
            position: relative; animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .detail-img-hero { width: 100%; height: 400px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-body { padding: 3rem; }
        .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
        .detail-title { font-size: 2.5rem; font-weight: 900; color: #ff4d4d; }
        .detail-date { font-weight: 700; opacity: 0.5; font-size: 1.1rem; }
        .detail-desc-full { font-size: 1.2rem; line-height: 1.8; opacity: 0.9; color: #e2e8f0; font-family: 'Outfit', sans-serif; white-space: pre-line; }

        /* Navigation Arrows in Modal */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            color: white; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .nav-arrow:hover { background: #ff4d4d; scale: 1.1; }
        .arrow-prev { left: 20px; }
        .arrow-next { right: 20px; }

        .close-modal:hover { opacity: 1; color: #ff4d4d; }

        /* Slideshow Inside Modal */
        .detail-slider-container {
            width: 100%; height: 400px; position: relative; overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: 0.5s ease;
        }
        .detail-slide.active { opacity: 1; }
        
        .slide-nav {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10;
        }
        .slide-dot {
            width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.3s;
        }
        .slide-dot.active { background: #ff4d4d; transform: scale(1.5); }
        
        .inner-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; background: rgba(0,0,0,0.5);
            color: white; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 10; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .inner-arrow:hover { background: #ff4d4d; }
        .inner-prev { left: 15px; }
        .inner-next { right: 15px; }

        @media (max-width: 600px) {
            .timeline-line-bg, .timeline-line-progress { left: 30px; transform: none; }
            .timeline-item { justify-content: flex-start; padding-left: 60px; padding-right: 0; }
            .timeline-dot { left: 30px; transform: none; }
            .timeline-item:nth-child(even) { padding-left: 60px; }
            .timeline-card { width: 100%; margin: 0; }
            .detail-img-hero { height: 250px; }
            .detail-title { font-size: 1.8rem; }
        }

        /* Add Milestone Btn & Add Modal (Missing in previous version) */
        .add-milestone-btn {
            position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px;
            background: #ff4d4d; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; box-shadow: 0 10px 20px rgba(255, 77, 77, 0.4);
            cursor: pointer; z-index: 1000; border: none; transition: 0.3s;
        }
        .add-milestone-btn:hover { transform: scale(1.1) rotate(90deg); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.95); padding: 2.5rem; border-radius: 35px; width: 450px;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
        .m-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 15px; border-radius: 15px; margin-bottom: 1rem;
        }
        .action-btn {
            background: #ff4d4d; color: white; border: none; padding: 12px 25px;
            border-radius: 100px; cursor: pointer; font-weight: 700; display: flex;
            align-items: center; gap: 10px; transition: 0.3s;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3); }
    </style>
</head>
<body class="love-page-body">
    <!-- Global Widgets -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
    </div>

    <div class="music-player">
        <i class="fa-solid fa-play music-btn" id="play-pause" onclick="toggleMusic()"></i>
        <span id="song-title">Perfect - Ed Sheeran ❤️</span>
        <audio id="bg-music" loop>
            <source src="https://files.catbox.moe/979u74.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="back-nav">
        <a href="love.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
    </div>

    <main class="timeline-wrapper">
        <div class="timeline-header">
            <h2>Hành Trình Kỷ Niệm</h2>
            <p>Cuộn để khám phá những dấu mốc hạnh phúc của chúng mình ✨</p>
        </div>

        <!-- Professional Toolbar -->
        <div class="timeline-controls">
            <div class="control-group">
                <label>TẦM NHÌN</label>
                <input type="range" class="zoom-slider" min="20" max="200" value="100" oninput="adjustZoom(this.value)">
            </div>
            <div class="control-group">
                <input type="text" class="search-timeline" placeholder="Tìm kiếm kỉ niệm..." oninput="filterTimeline(this.value)">
            </div>
        </div>

        <div id="timeline-main" class="timeline-main">
            <div class="timeline-line-bg"></div>
            <div id="line-progress" class="timeline-line-progress"></div>
            <div id="milestones-container"></div>
        </div>
    </main>

    <button class="add-milestone-btn" onclick="openAddModal()"><i class="fa-solid fa-plus"></i></button>

    <!-- Professional Detail Modal -->
    <div id="detail-modal" class="detail-overlay" onclick="closeDetailModal(event)">
        <div class="close-modal" onclick="closeDetailModal(event)"><i class="fa-solid fa-xmark"></i></div>
        
        <div class="nav-arrow arrow-prev" onclick="navigateMilestone(-1)"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="nav-arrow arrow-next" onclick="navigateMilestone(1)"><i class="fa-solid fa-angles-right"></i></div>

        <div class="detail-content" onclick="event.stopPropagation()">
            <div id="detail-slider" class="detail-slider-container">
                <!-- Slides will be injected here -->
            </div>
            <div class="detail-body">
                <div class="detail-header">
                    <div>
                        <span id="detail-date" class="detail-date"></span>
                        <h3 id="detail-title" class="detail-title"></h3>
                    </div>
                </div>
                <p id="detail-desc" class="detail-desc-full"></p>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" style="color: #ff4d4d; margin-bottom: 2rem;">Ghi lại kỉ niệm mới</h3>
            <input type="text" id="m-input-date" class="m-input" placeholder="Ngày tháng (VD: 10/02/2025)">
            <input type="text" id="m-input-title" class="m-input" placeholder="Tiêu đề khoảnh khắc">
            <label style="font-size: 0.8rem; opacity: 0.7; display: block; margin-bottom: 5px;">Ảnh kỉ niệm (Chọn nhiều ảnh)</label>
            <input type="file" id="m-input-file" class="m-input" accept="image/*" multiple>
            <textarea id="m-input-desc" class="m-input" style="height: 120px; resize: none;" placeholder="Cảm nhận của bạn về lúc đó..."></textarea>
            <div style="display: flex; gap: 15px;">
                <button class="action-btn" style="flex: 1; justify-content: center;" onclick="saveMilestone()">Lưu kỉ niệm</button>
                <button class="action-btn" style="flex: 1; justify-content: center; background: none;" onclick="closeAddModal()">Hủy</button>
            </div>
        </div>
    </div>

    <!-- Crop Modal -->
    <div id="crop-modal" class="modal-overlay" style="z-index: 4000;">
        <div class="modal-content" style="width: 800px; max-width: 90vw; text-align: center;">
            <h3 style="color: #ff4d4d; margin-bottom: 1rem;">Cắt & Chỉnh sửa ảnh</h3>
            <div style="width: 100%; height: 400px; background: #000; margin-bottom: 15px; border-radius: 15px; overflow: hidden;">
                <img id="crop-image" style="max-width: 100%; display: block;">
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="btn-confirm-crop" class="action-btn" style="flex: 1; justify-content: center;">Cắt & Tiếp tục</button>
                <button id="btn-skip-crop" class="action-btn" style="flex: 1; justify-content: center; background: none;">Bỏ qua cắt</button>
            </div>
        </div>
    </div>

    <script>
        let currentDetailId = null;
        let milestones = JSON.parse(localStorage.getItem('loveTimeline')) || [
            { id: 1, date: "10 Tháng 2, 2025", title: "Ngày đầu gặp gỡ", desc: "Khoảnh khắc định mệnh khi hai ta lần đầu biết nhau.\nÁnh mắt chạm nhau giữa dòng người hối hả, khởi đầu cho một câu chuyện đẹp.", images: ["https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=1200&q=80"] },
            { id: 2, date: "14 Tháng 2, 2025", title: "Lời tỏ tình ngọt ngào", desc: "Ngày mà anh lấy hết can đảm để nói lời yêu em.\nKhoảnh khắc 'chốt đơn' đầy hồi hộp nhưng vô cùng hạnh phúc.", images: ["https://images.unsplash.com/photo-1516589174184-c685266e4404?auto=format&fit=crop&w=1200&q=80"] },
            { id: 3, date: "01 Tháng 3, 2025", title: "Chuyến đi đầu tiên", desc: "Cùng nhau xách ba lô lên và đi khám phá những vùng đất mới.\nNhững nụ cười, những tấm ảnh và hàng ngàn kỉ niệm được lưu giữ.", images: ["https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80"] }
        ];

        const API_URL = "http://localhost:8080/api/milestones";

        function parseDateString(dateStr) {
            if (!dateStr) return new Date(0);
            dateStr = dateStr.trim();
            // Format: dd/mm/yyyy
            const parts1 = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (parts1) return new Date(parts1[3], parts1[2] - 1, parts1[1]);
            // Format: dd Tháng mm, yyyy
            const parts2 = dateStr.match(/^(\d{1,2})\s+Tháng\s+(\d{1,2}),\s+(\d{4})$/i);
            if (parts2) return new Date(parts2[3], parts2[2] - 1, parts2[1]);
            // Format: yyyy-mm-dd
            const parts3 = dateStr.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
            if (parts3) return new Date(parts3[1], parts3[2] - 1, parts3[3]);
            // Fallback
            const fallback = new Date(dateStr);
            if (!isNaN(fallback.getTime())) return fallback;
            return new Date(0);
        }

        async function renderTimeline(filter = "") {
            const container = document.getElementById('milestones-container');
            
            try {
                // Fetch from Java Backend
                const response = await fetch(API_URL);
                milestones = await response.json();
                
                // Sort chronologically (oldest first)
                milestones.sort((a, b) => {
                    return parseDateString(a.date) - parseDateString(b.date);
                });
                
                const filtered = milestones.filter(m => 
                    m.title.toLowerCase().includes(filter.toLowerCase()) || 
                    m.description.toLowerCase().includes(filter.toLowerCase()) ||
                    m.date.toLowerCase().includes(filter.toLowerCase())
                );

                container.innerHTML = filtered.map((m, idx) => `
                    <div class="timeline-item" data-id="${m.id}">
                        <div class="timeline-dot"></div>
                        <div class="timeline-card">
                            <i class="fa-solid fa-trash delete-milestone" title="Xóa" onclick="deleteMilestone(event, ${m.id})"></i>
                            <i class="fa-solid fa-pen-to-square edit-milestone" title="Sửa" onclick="editMilestone(event, ${m.id})"></i>
                            <div class="m-img-wrapper" onclick="openDetail(${m.id})">
                                <img src="${m.images && m.images.length > 0 ? (m.images[0].startsWith('http') ? m.images[0] : 'http://localhost:8080' + m.images[0]) : 'https://via.placeholder.com/800x400?text=Kỉ+Niệm'}" class="m-thumbnail">
                                ${m.images && m.images.length > 1 ? `<div style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 10px; font-size: 0.7rem; color: white;"><i class="fa-solid fa-images"></i> ${m.images.length}</div>` : ''}
                            </div>
                            <div class="m-content-preview" onclick="openDetail(${m.id})">
                                <span class="m-date">${m.date}</span>
                                <h3 class="m-title">${m.title}</h3>
                                <p class="m-desc">${m.description}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                initObserver();
                updateProgress();
                adjustZoom(currentZoom);
            } catch (error) {
                console.error("Lỗi khi tải dữ liệu từ Backend:", error);
                // Fallback to local if backend is down (optional)
            }
        }

        // --- Scroll Animations ---
        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.timeline-item').forEach(item => observer.observe(item));
        }

        function updateProgress() {
            const scrollPos = window.scrollY + window.innerHeight / 1.5;
            const container = document.getElementById('timeline-main');
            const containerTop = container.offsetTop;
            const containerHeight = container.offsetHeight;
            
            let progress = Math.max(0, Math.min(100, ((scrollPos - containerTop) / containerHeight) * 100));
            document.getElementById('line-progress').style.height = progress + "%";
        }

        window.onscroll = updateProgress;

        // --- Modal Navigation ---
        let currentImgIndex = 0;
        function openDetail(id) {
            currentDetailId = id;
            currentImgIndex = 0;
            const m = milestones.find(item => item.id === id);
            
            // Build Slideshow
            const slider = document.getElementById('detail-slider');
            if (m.images && m.images.length > 0) {
                slider.innerHTML = m.images.map((img, i) => `
                    <img src="${img.startsWith('http') ? img : 'http://localhost:8080' + img}" class="detail-slide ${i === 0 ? 'active' : ''}">
                `).join('');
                
                if (m.images.length > 1) {
                    slider.innerHTML += `
                        <div class="inner-arrow inner-prev" onclick="changeSlide(-1)"><i class="fa-solid fa-chevron-left"></i></div>
                        <div class="inner-arrow inner-next" onclick="changeSlide(1)"><i class="fa-solid fa-chevron-right"></i></div>
                        <div class="slide-nav">
                            ${m.images.map((_, i) => `<div class="slide-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')}
                        </div>
                    `;
                }
            } else {
                slider.innerHTML = `<img src="https://via.placeholder.com/800x600?text=Kỉ+Niệm" class="detail-slide active">`;
            }

            document.getElementById('detail-title').innerText = m.title;
            document.getElementById('detail-date').innerText = m.date;
            document.getElementById('detail-desc').innerText = m.description;
            document.getElementById('detail-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function changeSlide(dir) {
            const m = milestones.find(item => item.id === currentDetailId);
            const slides = document.querySelectorAll('.detail-slide');
            const dots = document.querySelectorAll('.slide-dot');
            
            slides[currentImgIndex].classList.remove('active');
            if (dots.length) dots[currentImgIndex].classList.remove('active');
            
            currentImgIndex += dir;
            if (currentImgIndex < 0) currentImgIndex = m.images.length - 1;
            if (currentImgIndex >= m.images.length) currentImgIndex = 0;
            
            slides[currentImgIndex].classList.add('active');
            if (dots.length) dots[currentImgIndex].classList.add('active');
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.detail-slide');
            const dots = document.querySelectorAll('.slide-dot');
            slides[currentImgIndex].classList.remove('active');
            dots[currentImgIndex].classList.remove('active');
            currentImgIndex = index;
            slides[currentImgIndex].classList.add('active');
            dots[currentImgIndex].classList.add('active');
        }

        function navigateMilestone(dir) {
            const index = milestones.findIndex(m => m.id === currentDetailId);
            let nextIndex = index + dir;
            if (nextIndex < 0) nextIndex = milestones.length - 1;
            if (nextIndex >= milestones.length) nextIndex = 0;
            openDetail(milestones[nextIndex].id);
        }

        function closeDetailModal(e) {
            document.getElementById('detail-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // --- Milestone Actions ---
        function filterTimeline(val) { renderTimeline(val); }
        
        let editingId = null;
        function openAddModal() { 
            editingId = null;
            document.getElementById('modal-title').innerText = "Ghi lại kỉ niệm mới";
            document.getElementById('m-input-date').value = '';
            document.getElementById('m-input-title').value = '';
            document.getElementById('m-input-file').value = '';
            document.getElementById('m-input-desc').value = '';
            document.getElementById('add-modal').style.display = 'flex'; 
        }

        function editMilestone(e, id) {
            e.stopPropagation();
            editingId = id;
            const m = milestones.find(item => item.id === id);
            document.getElementById('modal-title').innerText = "Chỉnh sửa kỉ niệm";
            document.getElementById('m-input-date').value = m.date;
            document.getElementById('m-input-title').value = m.title;
            document.getElementById('m-input-desc').value = m.description;
            document.getElementById('add-modal').style.display = 'flex';
        }

        let currentCropper = null;
        let originalFiles = [];
        let croppedFiles = [];

        document.getElementById('m-input-file').addEventListener('change', function(e) {
            originalFiles = Array.from(e.target.files);
            croppedFiles = []; // Reset
            if (originalFiles.length > 0) {
                processCropQueue(0);
            }
        });

        function processCropQueue(index) {
            if (index >= originalFiles.length) {
                return; // done
            }
            const file = originalFiles[index];
            if (!file.type.startsWith('image/')) {
                croppedFiles.push(file);
                processCropQueue(index + 1);
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('crop-image').src = event.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                
                if (currentCropper) {
                    currentCropper.destroy();
                }
                
                currentCropper = new Cropper(document.getElementById('crop-image'), {
                    viewMode: 1,
                    autoCropArea: 1
                });
                
                document.getElementById('btn-confirm-crop').onclick = () => confirmCrop(index);
                document.getElementById('btn-skip-crop').onclick = () => skipCrop(index);
            };
            reader.readAsDataURL(file);
        }

        function confirmCrop(index) {
            if (currentCropper) {
                currentCropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }).toBlob((blob) => {
                    const file = new File([blob], originalFiles[index].name, { type: "image/jpeg" });
                    croppedFiles.push(file);
                    document.getElementById('crop-modal').style.display = 'none';
                    processCropQueue(index + 1);
                }, 'image/jpeg', 0.8);
            }
        }

        function skipCrop(index) {
            croppedFiles.push(originalFiles[index]);
            document.getElementById('crop-modal').style.display = 'none';
            processCropQueue(index + 1);
        }

        function closeAddModal() { 
            document.getElementById('add-modal').style.display = 'none'; 
            // Clear inputs
            document.getElementById('m-input-date').value = '';
            document.getElementById('m-input-title').value = '';
            document.getElementById('m-input-file').value = '';
            document.getElementById('m-input-desc').value = '';
            croppedFiles = [];
            originalFiles = [];
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; // Optimize for web
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // Compress to JPEG 0.6 quality to save massive space
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        async function saveMilestone() {
            try {
                const date = document.getElementById('m-input-date').value;
                const title = document.getElementById('m-input-title').value;
                const desc = document.getElementById('m-input-desc').value;
                const files = document.getElementById('m-input-file').files;

                if (!date || !title) return alert('Vui lòng nhập ngày và tiêu đề!');

                // Use FormData for Multipart Upload
                const formData = new FormData();
                formData.append("date", date);
                formData.append("title", title);
                formData.append("desc", desc);
                
                if (croppedFiles.length > 0) {
                    for (let file of croppedFiles) {
                        formData.append("files", file);
                    }
                } else if (files.length > 0) {
                    for (let file of files) {
                        formData.append("files", file);
                    }
                }

                const saveBtn = document.querySelector('.action-btn');
                saveBtn.innerText = "Đang tải lên...";
                saveBtn.disabled = true;

                let response;
                if (editingId) {
                    // Update logic (can be POST or PUT depending on backend)
                    response = await fetch(`${API_URL}/${editingId}`, {
                        method: 'PUT',
                        body: formData
                    });
                } else {
                    response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData
                    });
                }

                if (response.ok) {
                    renderTimeline();
                    closeAddModal();
                } else {
                    alert("Lỗi khi lưu dữ liệu lên server!");
                }

                saveBtn.innerText = "Lưu kỉ niệm";
                saveBtn.disabled = false;
            } catch (error) {
                console.error("Lỗi kết nối Backend:", error);
                alert("Không thể kết nối tới Java Backend. Hãy chắc chắn server Spring Boot đang chạy!");
            }
        }

        async function deleteMilestone(e, id) {
            e.stopPropagation();
            if (confirm('Xóa kỉ niệm này khỏi hành trình?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) renderTimeline();
                } catch (error) {
                    alert("Lỗi khi xóa kỉ niệm!");
                }
            }
        }

        let currentZoom = 100;

        function adjustZoom(val) {
            currentZoom = val;
            const container = document.getElementById('milestones-container');
            const scaleVal = val / 100;
            
            // Apply scale and transform origin
            container.style.transform = `scale(${scaleVal})`;
            container.style.transformOrigin = 'top center';
            
            // Adjust container height to avoid empty space when scaled down
            container.style.marginBottom = `-${(1 - scaleVal) * container.offsetHeight}px`;
            
            // Adjust line height
            document.querySelector('.timeline-line-bg').style.transform = `scaleY(${scaleVal})`;
            document.querySelector('.timeline-line-bg').style.transformOrigin = 'top';
            document.querySelector('.timeline-line-progress').style.transform = `scaleY(${scaleVal})`;
            document.querySelector('.timeline-line-progress').style.transformOrigin = 'top';
        }



        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('dark-mode-icon');
            icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        const audio = document.getElementById('bg-music');
        function toggleMusic() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('play-pause').className = 'fa-solid fa-pause music-btn'; 
            } else { 
                audio.pause(); 
                document.getElementById('play-pause').className = 'fa-solid fa-play music-btn'; 
            }
        }

        window.onload = () => { renderTimeline(); adjustZoom(100); };
    </script>
</body>
